<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SUKA Shawarma</title>
</head>
<body>
<script>
// menu.html — redirect ke index.html dengan outlet slug dari query param
// Catatan: file ini dipertahankan untuk use case QR code per-outlet di masa depan
// Contoh: menu.html?outlet=cimanggu → index.html?outlet=cimanggu
var slug = new URLSearchParams(location.search).get('outlet');
location.replace('index.html' + (slug ? '?outlet=' + encodeURIComponent(slug) : ''));
</script>
</body>
</html>
