<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />

<body>
<div class="phone">

  <!-- Topbar -->
  <div class="topbar">
    <button class="topbar-ic" onclick="window.location.href='index.html'">‹</button>
    <div class="topbar-logo">
      <img src="assets/img/logo.png" alt="SUKA Shawarma" style="height:32px;width:auto;vertical-align:middle;margin-right:6px" onerror="this.style.display='none'">
      <span>SUKA Shawarma</span>

  <!-- Konten status -->

      <div class="skeleton" style="width:56px;height:56px;border-radius:50%;margin:0 auto 12px"></div>
      <div class="skeleton skeleton-line" style="width:60%;margin:0 auto 8px"></div>

    </div>

</div><!-- .phone -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- QR library (untuk render order number QR di state ready) -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/app.js"></script>
<script>
// ─── State ────────────────────────────────────────────────────────────────────
const orderNumber = getParam('order');
let order         = null;
let realtimeChannel = null;
let countdownTimer  = null;
let pollTimer       = null;

// Status terminal — tidak perlu poll lagi setelah ini
const TERMINAL_STATUSES = ['paid', 'done', 'cancelled', 'expired'];

// ─── Init ─────────────────────────────────────────────────────────────────────
(async function init() {
  if (!orderNumber) {
    renderError('Order tidak ditemukan. <a href="index.html">Kembali ke beranda</a>');
    return;
  }

  // Coba baca dari sessionStorage dulu (lebih cepat, data lengkap dari checkout)
  const cached = readCachedOrder();

  await loadOrder(cached);
})();

function readCachedOrder() {
  try {
    const raw = sessionStorage.getItem('suka_order');
    if (!raw) return null;
    const o = JSON.parse(raw);
    return o.order_number === orderNumber ? o : null;
  } catch { return null; }
}

// ─── Load order dari DB ───────────────────────────────────────────────────────
async function loadOrder(cached) {
  // Tampilkan data cache dulu (tidak perlu tunggu DB) agar user langsung lihat form upload
  if (cached && cached.status) renderStatus(cached);

  // Ambil order + outlet dari Supabase
  const { data, error } = await window.db
    .from('orders')
    .select('*, outlets(name, address, phone_wa)')
    .eq('order_number', orderNumber)
    .single();

  if (error || !data) {
    // Kalau DB gagal tapi sudah ada cache dengan status → biarkan cache tampil
    if (!cached || !cached.status) {
      renderError('Order tidak ditemukan. Pastikan URL sudah benar.');
    }
    return;
  }

  order = data;

  // Merge data tambahan dari cache jika belum ada di DB row
  if (cached) {
    order._qris_url = order.qris_url || cached.qris_url;
    order._pay_url  = order.tripay_pay_url || cached.pay_url;
  } else {
    order._qris_url = order.qris_url;
    order._pay_url  = order.tripay_pay_url;
  }

  // Simpan order aktif ke localStorage supaya bisa dipulihkan kalau tab hilang
  if (['pending_payment', 'awaiting_verification'].includes(order.status)) {
    localStorage.setItem('suka_last_order', JSON.stringify({
      order_number: order.order_number,
      url: window.location.href,
      saved_at: Date.now(),
    }));
  } else {
    localStorage.removeItem('suka_last_order');
  }

  renderStatus(order);
  subscribeRealtime(order.id);

  // Polling fallback tiap 5 detik — aktif jika status masih menunggu
  startPolling();
}

// ─── Polling fallback (backup jika Realtime tidak terpicu) ────────────────────
function startPolling() {
  stopPolling();
  if (!order || TERMINAL_STATUSES.includes(order.status)) return;

  pollTimer = setInterval(async () => {
    if (!order || TERMINAL_STATUSES.includes(order.status)) { stopPolling(); return; }

    const { data } = await window.db
      .from('orders')
      .select('status, cancelled_at, cancel_reason')
      .eq('order_number', orderNumber)
      .single();

    if (data && data.status !== order.status) {
      // Status berubah — reload penuh supaya semua data segar
      order = { ...order, ...data };
      renderStatus(order);
      if (TERMINAL_STATUSES.includes(data.status)) stopPolling();
    }
  }, 5000);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ─── Subscribe realtime untuk update otomatis ─────────────────────────────────
function subscribeRealtime(orderId) {
  if (realtimeChannel) window.db.removeChannel(realtimeChannel);

  realtimeChannel = window.db
    .channel('order-' + orderId)
    .on('postgres_changes', {
      event:  'UPDATE',
      schema: 'public',
      table:  'orders',
      filter: 'id=eq.' + orderId,
    }, payload => {
      const updated = { ...order, ...payload.new };
      updated._qris_url = order._qris_url;
      updated._pay_url  = order._pay_url;
      order = updated;
      renderStatus(order);
    })
    .subscribe();
}

// ─── Render UI berdasarkan status ─────────────────────────────────────────────
function renderStatus(o) {
  // Stop countdown lama jika ada
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }

  const outlet = o.outlets || {};
  const outletName    = outlet.name    || o.outlet_name    || '—';
  const outletAddress = outlet.address || o.outlet_address || '';

  let heroHtml = '';
  let extraHtml = '';

  switch (o.status) {

    case 'pending_payment':
      heroHtml = `
        <div class="status-hero">
          <div class="status-icon">💳</div>
          <div class="status-title">Transfer Dulu Yuk!</div>
          <div class="status-sub">Segera transfer dan upload buktinya di bawah</div>
          <span class="status-chip status-pending">BELUM TRANSFER</span>
        </div>`;

      extraHtml = `
        <div class="info-card">
          <div style="font-weight:700;font-size:14px;margin-bottom:10px">🏦 Info Rekening Tujuan</div>
          <div class="info-row">
            <span class="label">Bank</span>
            <span class="val" style="font-weight:700">BCA</span>
          </div>
          <div class="info-row">
            <span class="label">No. Rekening</span>
            <span class="val" style="font-weight:700;font-family:monospace;font-size:15px">0955193763</span>
          </div>
          <div class="info-row">
            <span class="label">Atas Nama</span>
            <span class="val">PT Suka Profit Berkah</span>
          </div>
          <div class="info-row">
            <span class="label">Jumlah Transfer</span>
            <span class="val" style="font-weight:800;color:var(--brand);font-size:15px">${formatRupiah(o.total)}</span>
          </div>
        </div>

        <div style="margin:0 0 10px;padding:12px 14px;background:#fef9c3;border-radius:10px;font-size:13px;line-height:1.6;color:#854d0e">
          📱 <b>Jangan tutup tab ini.</b><br/>
          Setelah transfer di m-banking, kembali ke tab browser ini lalu upload screenshot konfirmasi.
        </div>

        <div class="info-card" id="uploadCard">
          <div style="font-weight:700;font-size:14px;margin-bottom:10px">📸 Upload Bukti Transfer</div>
          <div id="proofPreview" style="display:none;margin-bottom:10px;text-align:center">
            <img id="proofImg" style="max-width:100%;border-radius:8px;max-height:200px;object-fit:cover" />
            <div style="font-size:12px;color:var(--muted);margin-top:6px">Pastikan nominal terlihat jelas</div>
          </div>
          <label id="proofLabel" style="display:flex;align-items:center;gap:10px;padding:14px 12px;border:2px dashed var(--line2);border-radius:10px;cursor:pointer;margin-bottom:10px;background:var(--bg)">
            <span style="font-size:28px">🖼️</span>
            <div>
              <div style="font-weight:700;font-size:14px">Pilih Screenshot / Foto</div>
              <div style="font-size:12px;color:var(--muted);margin-top:2px">Galeri atau kamera • JPG/PNG maks 5MB</div>
            </div>
            <input type="file" id="proofFile" accept="image/*" style="display:none" onchange="previewProof(this)" />
          </label>
          <button class="btn-add-big" id="btnUpload" onclick="doUploadProof('${o.order_number}')" disabled
            style="opacity:0.5">
            Kirim Bukti Transfer
          </button>
          <div id="uploadErr" style="color:var(--brand);font-size:12px;margin-top:8px;display:none"></div>
        </div>`;
      break;

    case 'awaiting_verification':
      heroHtml = `
        <div class="status-hero">
          <div class="status-icon">🔍</div>
          <div class="status-title">Menunggu Verifikasi</div>
          <div class="status-sub">Bukti transfer sudah diterima, admin sedang mengecek</div>
          <span class="status-chip status-preparing">CEK ADMIN</span>
        </div>`;

      extraHtml = o.proof_url ? `
        <div class="info-card" style="text-align:center">
          <div style="font-size:13px;color:var(--muted);margin-bottom:8px">Bukti transfer yang kamu kirim:</div>
          <img id="proofDisplayImg" data-path="${o.proof_url}" style="max-width:100%;border-radius:8px;max-height:220px;object-fit:cover;background:var(--line)" />
        </div>` : '';
      break;

    case 'paid':
      heroHtml = `
        <div class="status-hero">
          <div class="status-icon">✅</div>
          <div class="status-title">Pembayaran Dikonfirmasi!</div>
          <div class="status-sub">Transfer kamu sudah diverifikasi — outlet sedang menyiapkan pesanan</div>
          <span class="status-chip status-paid">DIKONFIRMASI</span>
        </div>`;
      break;

    case 'preparing':
      heroHtml = `
        <div class="status-hero">
          <div class="status-icon">👨‍🍳</div>
          <div class="status-title">Sedang Disiapkan</div>
          <div class="status-sub">Outlet sedang memproses pesananmu</div>
          <span class="status-chip status-preparing">DIPROSES</span>
        </div>`;
      break;

    case 'ready':
      heroHtml = `
        <div class="status-hero">
          <div class="status-icon">🎉</div>
          <div class="status-title">Pesanan Siap Diambil!</div>
          <div class="status-sub">Tunjukkan kode ini ke kasir</div>
          <span class="status-chip status-ready">SIAP DIAMBIL</span>
        </div>`;

      extraHtml = `
        <div class="info-card" style="text-align:center">
          <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Kode Order</div>
          <div class="order-number-big">${o.order_number}</div>
          <div class="qr-canvas-wrap" id="qrOrderWrap"></div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px">Scan atau tunjukkan nomor di atas</div>
        </div>`;
      break;

    case 'done':
      heroHtml = `
        <div class="status-hero">
          <div class="status-icon">🌯</div>
          <div class="status-title">Selesai!</div>
          <div class="status-sub">Terima kasih sudah pesan di SUKA Shawarma</div>
          <span class="status-chip status-done">SELESAI</span>
        </div>`;

      extraHtml = `
        <div class="info-card" style="text-align:center">
          <a href="index.html" class="btn-add-big" style="display:block;text-decoration:none;text-align:center">
            Pesan Lagi
          </a>
        </div>`;
      break;

    case 'cancelled':
      heroHtml = `
        <div class="status-hero">
          <div class="status-icon">❌</div>
          <div class="status-title">Pesanan Dibatalkan</div>
          <div class="status-sub">${o.cancel_reason || 'Pesanan dibatalkan oleh outlet'}</div>
          <span class="status-chip status-cancelled">DIBATALKAN</span>
        </div>`;

      extraHtml = `
        <div class="info-card" style="text-align:center">
          <div style="font-size:13px;color:var(--muted);margin-bottom:14px">
            Jika sudah membayar, refund diproses 1–3 hari kerja.
          </div>
          <a href="index.html" class="btn-add-big" style="display:block;text-decoration:none;text-align:center">
            Pesan Ulang
          </a>
        </div>`;
      break;

    case 'expired':
      heroHtml = `
        <div class="status-hero">
          <div class="status-icon">⌛</div>
          <div class="status-title">Pesanan Kedaluwarsa</div>
          <div class="status-sub">Bukti transfer tidak diterima dalam 2 jam. Silakan pesan ulang.</div>
          <span class="status-chip status-expired">KEDALUWARSA</span>
        </div>`;

      extraHtml = `
        <div class="info-card" style="text-align:center">
          <a href="index.html"
             class="btn-add-big" style="display:block;text-decoration:none;text-align:center">
            Pesan Ulang
          </a>
        </div>`;
      break;

    default:
      heroHtml = `
        <div class="status-hero">
          <div class="status-icon">🔄</div>
          <div class="status-title">Memproses…</div>
          <div class="status-sub">Mohon tunggu sebentar</div>
        </div>`;
  }

  // Info order bawah
  const fmtOrderTime = t => {
    if (!t) return '—';
    const d = new Date(t);
    return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })
      + ', ' + d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  };

  const infoHtml = `
    <div class="info-card">
      <div style="font-weight:700;font-size:14px;margin-bottom:8px">📋 Detail Pesanan</div>
      <div class="info-row">
        <span class="label">No. Order</span>
        <span class="val" style="font-family:monospace;font-size:13px">${o.order_number}</span>
      </div>
      <div class="info-row">
        <span class="label">Outlet</span>
        <span class="val">${outletName}</span>
      </div>
      ${outletAddress ? `<div class="info-row">
        <span class="label">Alamat</span>
        <span class="val" style="font-size:13px;font-weight:500;color:var(--muted)">${outletAddress}</span>
      </div>` : ''}
      <div class="info-row">
        <span class="label">Waktu Pesan</span>
        <span class="val" style="font-size:13px">${fmtOrderTime(o.created_at)}</span>
      </div>
      ${o.pickup_time ? `<div class="info-row">
        <span class="label">Waktu Ambil</span>
        <span class="val" style="font-weight:700">${o.pickup_time}</span>
      </div>` : ''}
      <div class="info-row" style="border-top:1px dashed var(--line2);margin-top:6px;padding-top:8px">
        <span class="label" style="font-weight:700">Total</span>
        <span class="val" style="font-size:16px;font-weight:800;color:var(--brand)">${formatRupiah(o.total)}</span>
      </div>
    </div>
    <div style="height:32px"></div>`;

  document.getElementById('pageContent').innerHTML = heroHtml + extraHtml + infoHtml;

  // Post-render hooks per status
  if (o.status === 'ready') {
    renderOrderQR(o.order_number);
  }
  if (o.status === 'awaiting_verification' && o.proof_url) {
    loadSignedProofUrl(o.proof_url);
  }
}

// ─── Load public URL untuk tampil foto bukti transfer ─────────────────────────
function loadSignedProofUrl(pathOrUrl) {
  const img = document.getElementById('proofDisplayImg');
  if (!img || !pathOrUrl) return;
  // Jika sudah full URL, pakai langsung
  if (pathOrUrl.startsWith('http')) { img.src = pathOrUrl; return; }
  // Jika hanya path, generate public URL
  const { data } = window.db.storage.from('transfer-proofs').getPublicUrl(pathOrUrl);
  if (data?.publicUrl) img.src = data.publicUrl;
}

// ─── QR code QRIS (untuk state pending_payment) ───────────────────────────────
function buildQrisBox(o) {
  const qrisUrl = o._qris_url;
  let qrisContent = '';

  if (qrisUrl) {
    if (qrisUrl.startsWith('http')) {
      // URL gambar QR dari Tripay
      qrisContent = `<div class="qris-img"><img src="${qrisUrl}" alt="QRIS" /></div>`;
    } else {
      // Raw QRIS string — render canvas via QRCode.js
      qrisContent = `<div id="qrisCanvas" style="display:flex;justify-content:center;margin-bottom:10px"></div>`;
    }
  } else {
    qrisContent = `
      <div style="padding:20px 0;color:var(--accent-ink);font-size:13px">
        QR tidak tersedia. Gunakan tombol "Buka Halaman Tripay" di bawah.
      </div>`;
  }

  return `
    <div class="qris-box" style="margin:0 12px 12px">
      <div class="qris-title">Scan QRIS untuk Membayar</div>
      ${qrisContent}
      <div class="qris-amount">${formatRupiah(o.total)}</div>
      <div class="qris-info">
        <span class="countdown" id="countdown">—</span>
      </div>
    </div>`;
}

// ─── Render QR untuk order number (state ready) ───────────────────────────────
function renderOrderQR(orderNum) {
  const wrap = document.getElementById('qrOrderWrap');
  if (!wrap) return;
  try {
    new QRCode(wrap, {
      text:         orderNum,
      width:        180,
      height:       180,
      correctLevel: QRCode.CorrectLevel.M,
    });
  } catch (e) {
    wrap.style.display = 'none';
  }
}

// ─── Countdown timer ──────────────────────────────────────────────────────────
function startCountdownUI(expiresAt) {
  // Render raw QRIS string jika perlu (setelah DOM tersedia)
  const qrisUrl = order?._qris_url;
  if (qrisUrl && !qrisUrl.startsWith('http')) {
    const canvas = document.getElementById('qrisCanvas');
    if (canvas) {
      try {
        new QRCode(canvas, {
          text: qrisUrl, width: 240, height: 240,
          correctLevel: QRCode.CorrectLevel.M,
        });
      } catch { /* fallback: tidak tampil */ }
    }
  }

  function tick() {
    const el = document.getElementById('countdown');
    if (!el) return;
    const ms = new Date(expiresAt) - Date.now();
    if (ms <= 0) {
      el.textContent = '⌛ Waktu habis';
      el.style.color = 'var(--brand)';
      // Update UI ke expired tanpa tunggu realtime
      setTimeout(() => {
        if (order && order.status === 'pending_payment') {
          order.status = 'expired';
          renderStatus(order);
        }
      }, 1500);
      return;
    }
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    el.textContent = `⏱ Berakhir dalam ${m}:${String(s).padStart(2, '0')}`;
    if (ms < 60000) el.style.color = 'var(--brand)';
    countdownTimer = setTimeout(tick, 1000);
  }
  tick();
}

// ─── Tombol "Sudah Bayar? Cek Status" ────────────────────────────────────────
let isCheking = false;

async function doCekStatus() {
  if (isCheking) return;
  isCheking = true;

  const btn = document.getElementById('btnCekStatus');
  if (btn) { btn.textContent = 'Mengecek…'; btn.disabled = true; }

  try {
    const result = await checkOrderStatus(orderNumber);
    if (result.synced && result.status !== 'pending_payment') {
      // Status berubah — reload dari DB
      await loadOrder(null);
    } else {
      showToast(result.status === 'pending_payment'
        ? '⏳ Pembayaran belum terdeteksi. Tunggu sebentar.'
        : '✅ Status diperbarui');
    }
  } catch (err) {
    showToast('Gagal cek status. Coba lagi.');
  } finally {
    isCheking = false;
    const b = document.getElementById('btnCekStatus');
    if (b) { b.textContent = 'Sudah Bayar? Cek Status'; b.disabled = false; }
  }
}

// ─── Preview foto bukti transfer ─────────────────────────────────────────────
function previewProof(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  if (file.size > 5 * 1024 * 1024) {
    showToast('❌ File terlalu besar (maks 5MB)');
    input.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('proofImg').src = e.target.result;
    document.getElementById('proofPreview').style.display = '';
    const btn = document.getElementById('btnUpload');
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
  };
  reader.readAsDataURL(file);
}

// ─── Upload bukti transfer + update status ────────────────────────────────────
let isUploading = false;

async function doUploadProof(orderNum) {
  if (isUploading) return;
  const fileInput = document.getElementById('proofFile');
  if (!fileInput || !fileInput.files[0]) { showToast('Pilih foto dulu'); return; }

  isUploading = true;
  const btn = document.getElementById('btnUpload');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Mengirim…'; }

  try {
    const file     = fileInput.files[0];
    const ext      = file.name.split('.').pop().toLowerCase() || 'jpg';
    const path     = `${orderNum}/${Date.now()}.${ext}`;

    // Upload ke Supabase Storage
    const { data: upData, error: upErr } = await window.db.storage
      .from('transfer-proofs')
      .upload(path, file, { upsert: true, contentType: file.type });

    if (upErr) throw new Error('Upload gagal: ' + upErr.message);

    // Ambil public URL (bucket harus public di Supabase Storage settings)
    const { data: urlData } = window.db.storage
      .from('transfer-proofs')
      .getPublicUrl(path);
    const proofUrl = urlData?.publicUrl || path;

    // Panggil RPC untuk update status
    const { data: ok, error: rpcErr } = await window.db
      .rpc('submit_transfer_proof', {
        p_order_number: orderNum,
        p_proof_url:    proofUrl,
      });

    if (rpcErr) throw new Error(rpcErr.message);
    if (!ok) throw new Error('Order tidak ditemukan atau status sudah berubah');

    // Kirim notif WA ke admin
    fetch(`${window.SUKA_CONFIG.supabaseUrl}/functions/v1/send-wa-notifications`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${window.SUKA_CONFIG.supabaseAnonKey}`,
        'apikey': window.SUKA_CONFIG.supabaseAnonKey,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ order_id: order?.id, event: 'transfer_submitted' }),
    }).catch(() => {});

    // Panggil AI verifikasi di background (tidak blokir UI)
    if (order?.id) {
      fetch(`${window.SUKA_CONFIG.supabaseUrl}/functions/v1/verify-transfer-proof`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${window.SUKA_CONFIG.supabaseAnonKey}`,
          'apikey': window.SUKA_CONFIG.supabaseAnonKey,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ order_id: order.id }),
      }).catch(() => {});
    }

    showToast('✅ Bukti transfer terkirim!');
    await loadOrder(null);

  } catch (e) {
    const errEl = document.getElementById('uploadErr');
    if (errEl) { errEl.textContent = '❌ ' + e.message; errEl.style.display = ''; }
    if (btn) { btn.disabled = false; btn.textContent = 'Kirim Bukti Transfer'; btn.style.opacity = '1'; }
  } finally {
    isUploading = false;
  }
}

// ─── Error display ────────────────────────────────────────────────────────────
function renderError(msg) {
  document.getElementById('pageContent').innerHTML = `
    <div class="error-box" style="margin:24px 16px">
      <p>${msg}</p>
      <button class="btn-retry" onclick="window.location.href='index.html'">Ke Beranda</button>
    </div>`;
}
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
