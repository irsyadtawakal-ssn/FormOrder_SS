<!doctype html>
<html lang="id"><head><meta charset="utf-8">
<title>spacing.html</title>
<link rel="stylesheet" href="_shared.css">
<style>.b{height:24px;background:#f29744;border-radius:4px;display:flex;align-items:center;padding:0 6px;color:#fff;font-family:var(--font-mono);font-size:10px;font-weight:700}.r{display:flex;align-items:center;gap:8px;margin-bottom:6px}.t{font-family:var(--font-mono);font-size:10px;color:#8a6b5e;min-width:32px;text-align:right}</style>
</head><body>
<div class="card" style="height:160px">
      <div class="label">Spacing scale (px)</div>
      <div style="margin-top:12px">
        <div class="r"><span class="t">4</span><div class="b" style="width:4px"></div></div>
        <div class="r"><span class="t">8</span><div class="b" style="width:8px"></div></div>
        <div class="r"><span class="t">12</span><div class="b" style="width:12px"></div></div>
        <div class="r"><span class="t">16</span><div class="b" style="width:16px"></div>&nbsp;<span style="font-size:10px;color:#8a6b5e">← gutter</span></div>
        <div class="r"><span class="t">24</span><div class="b" style="width:24px"></div></div>
        <div class="r"><span class="t">32</span><div class="b" style="width:32px"></div></div>
      </div>
    </div>
</body></html>
