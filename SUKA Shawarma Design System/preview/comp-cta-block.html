<!doctype html>
<html lang="id"><head><meta charset="utf-8">
<title>comp-cta-block.html</title>
<link rel="stylesheet" href="_shared.css">
<style>.cta{width:100%;display:flex;justify-content:space-between;align-items:center;background:#f29744;color:#fff;border:0;border-radius:10px;padding:15px 18px;font-weight:700;font-size:15px;font-family:var(--font-sans);box-shadow:0 6px 20px rgba(242,151,68,.30)}</style>
</head><body>
<div class="card" style="height:150px">
      <div class="label">Big CTA (sheet footer)</div>
      <div style="max-width:420px;margin-top:14px">
        <div style="display:flex;justify-content:space-between;font-size:13px;color:#8a6b5e;margin-bottom:4px"><span>Subtotal</span><span style="font-variant-numeric:tabular-nums">Rp 45.000</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#8a6b5e;margin-bottom:10px"><span>Biaya layanan (0.7%)</span><span style="font-variant-numeric:tabular-nums">Rp 315</span></div>
        <button class="cta"><span>Bayar Sekarang</span><span style="font-variant-numeric:tabular-nums">Rp 45.315</span></button>
      </div>
    </div>
