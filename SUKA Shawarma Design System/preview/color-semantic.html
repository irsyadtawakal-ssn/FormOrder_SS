<!doctype html>
<html lang="id"><head><meta charset="utf-8">
<title>color-semantic.html</title>
<link rel="stylesheet" href="_shared.css">
<style>.s{flex:1;border-radius:10px;padding:10px;min-height:90px;border:1px solid rgba(64,10,7,.06);display:flex;flex-direction:column;justify-content:space-between}.n{font-size:11px;font-weight:700;letter-spacing:.3px}.h{font-family:var(--font-mono);font-size:10px;opacity:.85}.r{font-size:10px;font-weight:600;opacity:.9}</style>
</head><body>
<div class="card" style="height:130px">
      <div class="row" style="gap:10px">
        <div class="s" style="background:#f0fdf4;color:#0a7d2c"><div><div class="n">Success</div><div class="r">● Buka · Selesai</div></div><div class="h">#0a7d2c / #f0fdf4</div></div>
        <div class="s" style="background:#fff8e1;color:#7a5c00"><div><div class="n">Warn / hint</div><div class="r">💡 banner copy</div></div><div class="h">#7a5c00 / #fff8e1</div></div>
        <div class="s" style="background:#eff6ff;color:#2563eb"><div><div class="n">Info</div><div class="r">Dibayar</div></div><div class="h">#2563eb / #eff6ff</div></div>
        <div class="s" style="background:#fbe7df;color:#701604"><div><div class="n">Danger</div><div class="r">Dibatalkan</div></div><div class="h">#701604 / #fbe7df</div></div>
      </div></div>
</body></html>
