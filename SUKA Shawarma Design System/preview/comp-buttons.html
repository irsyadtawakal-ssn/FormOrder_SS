<!doctype html>
<html lang="id"><head><meta charset="utf-8">
<title>comp-buttons.html</title>
<link rel="stylesheet" href="_shared.css">
<style>.btn{font-family:var(--font-sans);font-weight:700;font-size:14px;padding:12px 18px;border-radius:10px;border:0;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px}.primary{background:#f29744;color:#fff}.secondary{background:#400a07;color:#fff}.outline{background:transparent;color:#400a07;border:1.5px solid #e6d4bf}.small{font-size:13px;padding:6px 14px;border-radius:999px;font-weight:600;background:#fff1e0;color:#701604;border:0}.add{width:32px;height:32px;border-radius:50%;background:#f29744;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;border:0;font-weight:300;line-height:1}</style>
</head><body>
<div class="card" style="height:140px">
      <div class="label">Buttons</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px">
        <button class="btn primary">Bayar Sekarang</button>
        <button class="btn secondary">Ke Kasir</button>
        <button class="btn outline">Batal</button>
        <button class="btn small">Ganti outlet</button>
        <button class="add">+</button>
      </div>
    </div>
</body></html>
