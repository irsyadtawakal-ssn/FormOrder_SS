<!doctype html>
<html lang="id"><head><meta charset="utf-8">
<title>type-price.html</title>
<link rel="stylesheet" href="_shared.css">
<style>.t{font-family:var(--font-mono);font-size:10px;color:#8a6b5e;display:block;margin-bottom:6px}.big{font-size:24px;font-weight:800;color:#f29744;line-height:1;font-variant-numeric:tabular-nums}.normal{font-size:14px;font-weight:700;color:#f29744;font-variant-numeric:tabular-nums}.old{font-size:11px;color:#b39a8a;text-decoration:line-through;font-weight:500;margin-left:6px;font-variant-numeric:tabular-nums}.disc{font-size:10px;font-weight:700;color:#701604;background:#fff1e0;padding:1px 5px;border-radius:3px;margin-left:6px}</style>
</head><body>
<div class="card" style="height:140px">
      <div class="label">Price treatments</div>
      <div style="display:flex;gap:36px;margin-top:14px;align-items:flex-end">
        <div><span class="t">Hero / deal card</span><div><span class="big">Rp 25.000</span></div><div style="margin-top:4px"><span class="old">Rp 35.000</span><span class="disc">-29%</span></div></div>
        <div><span class="t">Inline price</span><div><span class="normal">Rp 18.000</span><span class="old">Rp 22.000</span></div></div>
        <div><span class="t">Cart total</span><div style="color:#fff;background:#400a07;padding:10px 14px;border-radius:10px;font-weight:800;font-size:15px;font-variant-numeric:tabular-nums">Rp 47.000</div></div>
      </div>
    </div>
</body></html>
