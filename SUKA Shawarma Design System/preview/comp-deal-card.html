<!doctype html>
<html lang="id"><head><meta charset="utf-8">
<title>comp-deal-card.html</title>
<link rel="stylesheet" href="_shared.css">
<style>.card{background:#fff7ed}.deal{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:#fff;border-radius:14px;box-shadow:0 1px 2px rgba(64,10,7,.04),0 4px 16px rgba(64,10,7,.07);max-width:520px}.iwrap{position:relative;flex-shrink:0}.img{width:108px;height:80px;border-radius:12px;background:linear-gradient(135deg,#fde2c4,#ffb088);display:flex;align-items:center;justify-content:center;font-size:36px}.b{position:absolute;top:5px;left:5px;background:#f29744;color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.3px}.body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}.n{font-weight:700;font-size:14px;color:#400a07}.d{font-size:12px;color:#8a6b5e;line-height:1.4}.pr{display:flex;justify-content:space-between;align-items:flex-end;margin-top:6px;gap:8px}.pp{font-size:18px;font-weight:800;color:#f29744;line-height:1;font-variant-numeric:tabular-nums}.pm{display:flex;align-items:center;gap:5px;margin-top:3px}.po{font-size:11px;color:#b39a8a;text-decoration:line-through}.pd{font-size:10px;font-weight:700;color:#701604;background:#fff1e0;padding:1px 5px;border-radius:3px}.add{width:32px;height:32px;border-radius:50%;background:#f29744;color:#fff;border:0;font-size:22px;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}</style>
</head><body>
<div class="card" style="height:165px">
      <div class="deal">
        <div class="iwrap">
          <div class="img">🌯</div>
          <span class="b">BEST SELLER</span>
        </div>
        <div class="body">
          <div class="n">Shawarma Daging Klasik</div>
          <div class="d">Daging sapi panggang, sayur segar, saus tahini di tortilla hangat.</div>
          <div class="pr">
            <div>
              <div class="pp">Rp 25.000</div>
              <div class="pm"><span class="po">Rp 35.000</span><span class="pd">-29%</span></div>
            </div>
            <button class="add">+</button>
          </div>
        </div>
      </div>
    </div>
</body></html>
