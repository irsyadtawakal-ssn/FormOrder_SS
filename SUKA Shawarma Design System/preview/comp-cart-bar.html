<!doctype html>
<html lang="id"><head><meta charset="utf-8">
<title>comp-cart-bar.html</title>
<link rel="stylesheet" href="_shared.css">
<style>.cart{background:#400a07;color:#fff;border-radius:14px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 30px rgba(64,10,7,.18);max-width:460px;width:100%}.cnt{background:#fff;color:#400a07;width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}.lbl{font-size:11px;opacity:.75}.tot{font-weight:800;font-size:15px;font-variant-numeric:tabular-nums}.cta{background:#f29744;padding:8px 16px;border-radius:10px;font-weight:700;font-size:13px}</style>
</head><body>
<div class="card" style="height:130px">
      <div class="label">Floating cart bar</div>
      <div style="margin-top:14px;display:flex;justify-content:center">
        <div class="cart">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="cnt">3</div>
            <div><div class="lbl">3 item</div><div class="tot">Rp 47.000</div></div>
          </div>
          <div class="cta">Pesan →</div>
        </div>
      </div>
    </div>
</body></html>
