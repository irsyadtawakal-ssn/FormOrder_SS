<!doctype html>
<html lang="id"><head><meta charset="utf-8">
<title>shadows.html</title>
<link rel="stylesheet" href="_shared.css">
<style>.b{flex:1;height:80px;background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#8a6b5e}</style>
</head><body>
<div class="card" style="height:170px">
      <div class="label">Shadow system</div>
      <div style="display:flex;gap:18px;align-items:flex-end;margin-top:14px;padding:0 4px 14px">
        <div class="b" style="box-shadow:0 1px 2px rgba(64,10,7,.04)">shadow-sm</div>
        <div class="b" style="box-shadow:0 1px 2px rgba(64,10,7,.04), 0 4px 16px rgba(64,10,7,.07)">shadow</div>
        <div class="b" style="box-shadow:0 8px 30px rgba(64,10,7,.18)">shadow-lg</div>
        <div class="b" style="background:#f29744;color:#fff;box-shadow:0 6px 20px rgba(242,151,68,.30);font-weight:700">shadow-brand</div>
      </div>
    </div>
</body></html>
