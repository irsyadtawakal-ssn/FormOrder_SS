<html lang="id"><head><meta charset="utf-8">
<title>comp-hint-empty.html</title>
<link rel="stylesheet" href="_shared.css">
<style>.hint{background:#fff8e1;border-radius:10px;padding:10px 12px;font-size:12px;color:#7a5c00}.empty{text-align:center;color:#b39a8a;padding:12px 20px}.ei{font-size:42px;margin-bottom:8px}.et{font-size:15px;font-weight:700;color:#6b3a31;margin-bottom:4px}.ed{font-size:13px}.toast{background:#400a07;color:#fff;padding:9px 18px;border-radius:999px;font-size:13px;display:inline-block}</style>

        <div class="hint" style="flex:1;max-width:240px">💡 Pesanan langsung tercatat. Selesaikan pembayaran di kasir outlet saat pickup.</div>

        <div style="flex:0 0 auto"><div class="toast">✓ Ditambahkan ke keranjang</div></div>
      </div>
    </div>
