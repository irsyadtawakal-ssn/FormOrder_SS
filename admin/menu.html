<html lang="id">
<head>

<style type="text/tailwindcss">
  @theme {
    --color-brand: #f29744;
    --color-brand-bg: #fff7ed;
    --color-brand-dark: #ee8a2c;
  }
  @utility form-group {
    @apply flex flex-col gap-1.5 mb-4;
  }
  @utility form-label {
    @apply text-xs font-bold text-gray-600 uppercase tracking-wide;
  }
  @utility form-input {
    @apply w-full bg-white border border-gray-200 text-gray-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand transition-all placeholder:text-gray-300;
  }
  @utility btn-add-big {
    @apply w-full bg-brand hover:bg-brand-dark text-white font-bold py-3 rounded-xl transition-all shadow-md shadow-brand/10 text-center cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed;
  }

  @utility action-btn {
    @apply border-0 rounded-lg px-3.5 py-1.5 text-xs font-semibold cursor-pointer shrink-0 transition-colors inline-flex items-center justify-center gap-1;
  }
  @utility action-primary {
    @apply bg-brand hover:bg-brand-dark text-white;
  }
  @utility action-secondary {
    @apply bg-gray-100 hover:bg-gray-200 text-gray-700;
  }
  @utility action-danger {
    @apply bg-red-50 hover:bg-red-100 text-red-600;
  }

  @utility toggle-wrap {
    @apply relative inline-flex cursor-pointer;
  }
  @utility toggle-slider {
    @apply w-10 h-6 bg-gray-200 rounded-full transition-colors relative block;
  }
  .toggle-slider::after {
    content: "";
    @apply absolute w-4.5 h-4.5 rounded-full bg-white top-0.75 left-0.75 transition-transform shadow;
  }
  .toggle-wrap input {
    @apply opacity-0 w-0 h-0 absolute;
  }
  .toggle-wrap input:checked + .toggle-slider {
    @apply bg-green-500;
  }
  .toggle-wrap input:checked + .toggle-slider::after {
    @apply translate-x-4;
  }

  @utility admin-modal-overlay {
    @apply fixed inset-0 bg-black/50 z-50 flex items-end md:items-center justify-center p-0 md:p-4;
  }
  @utility admin-modal-card {
    @apply bg-white rounded-t-2xl md:rounded-2xl w-full max-w-lg max-h-[92vh] md:max-h-[85vh] overflow-y-auto flex flex-col shadow-xl;
  }
  @utility admin-modal-header {
    @apply p-4 border-b border-gray-100 flex justify-between items-center sticky top-0 bg-white z-10 font-bold text-gray-800;
  }
  @utility admin-modal-body {
    @apply p-6 flex-1 overflow-y-auto space-y-4;
  }
  @utility admin-modal-footer {
    @apply p-4 border-t border-gray-100 sticky bottom-0 bg-white;
  }
  @utility sheet-close {
    @apply text-2xl font-light text-gray-400 hover:text-gray-600 transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100;
  }
  @utility hint-banner {
    @apply bg-brand-bg text-brand text-xs font-semibold px-4 py-3 rounded-xl border border-brand/10 flex items-center gap-2;
  }

  .filter-tab {
    @apply shrink-0 px-4 py-2 rounded-full text-sm font-semibold transition-colors bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 cursor-pointer;
  }
  .filter-tab.active {
    @apply bg-brand text-white border-brand font-bold hover:bg-brand-dark;
  }
  @utility skeleton-card {
    @apply bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col animate-pulse;
  }
  @utility skeleton-line {
    @apply bg-gray-200 rounded h-4 mb-2 w-1/2;
  }
  @utility short {
    @apply w-1/4;
  }
  @utility admin-order-row {
    @apply bg-white rounded-xl p-4 border border-gray-100 shadow-sm hover:shadow-md transition-shadow mb-3;
  }
</style>
</head>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let allItems     = [];
let categories   = [];
let overrideMap  = {};  // { menu_item_id: { id, is_available } } — untuk outlet_staff
let outletData   = null;
let currentCat   = '';
let isSuperAdmin = false;

// ─── Init ─────────────────────────────────────────────────────────────────────
(async function init() {
  const u = await requireAuth();
  if (!u) return;
  isSuperAdmin = u.role === 'super_admin';

  if (!isSuperAdmin) {
    // Tampilkan banner outlet yang sedang dikelola staff
    const { data: od } = await window.db
      .from('outlets').select('id,name').eq('id', u.outlet_id).single();
    outletData = od;
    if (od) {
      const banner = document.createElement('div');
      banner.className = 'hint-banner mb-4';
      banner.innerHTML = `<i data-lucide="map-pin" class="w-4 h-4 text-brand"></i> Mengatur ketersediaan menu untuk <b>${od.name}</b>`;
      document.getElementById('catTabs').before(banner);
    }
  }

  await Promise.all([loadCategories(), loadItems()]);
  if (window.lucide) {
    window.lucide.createIcons();
  }
})();

// ─── Data loaders ─────────────────────────────────────────────────────────────
async function loadCategories() {
  const { data } = await window.db
    .from('categories').select('*').order('sort_order').order('name');
  categories = data || [];

  const tabs = document.getElementById('catTabs');
  // Bersihkan tab lama (sisakan tombol "Semua" yang statis) agar bisa dipanggil ulang
  tabs.querySelectorAll('.filter-tab[data-cat]:not([data-cat=""])').forEach(b => b.remove());
  categories.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-tab';
    btn.dataset.cat = c.id;
    btn.textContent = c.name;
    if (c.is_active === false) btn.style.opacity = '0.5';
    btn.onclick = () => setCat(c.id);
    tabs.appendChild(btn);
  });
}

// ─── Kelola Kategori (super_admin) ────────────────────────────────────────────
function openCategoryManager() {
  if (!isSuperAdmin) return;

  const rows = categories.length === 0
    ? `<div class="text-gray-400 text-xs py-3 text-center">Belum ada kategori</div>`
    : categories.map(c => {
        const count = allItems.filter(i => i.category_id === c.id).length;
        return `<div class="flex items-center gap-2 bg-gray-50 rounded-xl px-3 py-2.5 mb-2" style="opacity:${c.is_active === false ? 0.55 : 1}">
          <div class="flex-1 min-w-0">
            <div class="font-semibold text-sm text-gray-800 truncate">${escHtml(c.name)}</div>
            <div class="text-[11px] text-gray-500 mt-0.5">Urutan ${c.sort_order} · ${count} menu${c.is_active === false ? ' · nonaktif' : ''}</div>
          </div>
          <label class="toggle-wrap" title="Aktif/nonaktif">
            <input type="checkbox" ${c.is_active !== false ? 'checked' : ''} onchange="toggleCategory('${c.id}',this.checked)" />
            <span class="toggle-slider"></span>
          </label>
          <button class="action-btn action-secondary" style="font-size:11px;padding:4px 10px" onclick="openCategoryForm('${c.id}')">Edit</button>
          <button class="action-btn action-danger" style="font-size:11px;padding:4px 10px" onclick="hapusCategory('${c.id}')">Hapus</button>
        </div>`;
      }).join('');

  openModal('Kelola Kategori', `
    <div id="catList">${rows}</div>
    <button class="action-btn action-primary" style="width:100%;margin-top:8px;padding:10px" onclick="openCategoryForm(null)">
      <i data-lucide="plus" class="w-4 h-4 mr-1"></i> Tambah Kategori
    </button>
  `);

  if (window.lucide) window.lucide.createIcons();
}

function openCategoryForm(catId) {
  if (!isSuperAdmin) return;
  const cat   = catId ? categories.find(c => c.id === catId) : null;
  const isNew = !cat;
  const nextSort = categories.length
    ? Math.max(...categories.map(c => c.sort_order || 0)) + 1 : 0;

  openModal(isNew ? '+ Tambah Kategori' : 'Edit Kategori', `
    <div class="form-group">
      <label class="form-label">Nama Kategori</label>
      <input id="cName" class="form-input" value="${cat ? escHtml(cat.name) : ''}" placeholder="Nama kategori" />
    </div>
    <div class="form-group">
      <label class="form-label">Urutan Tampil</label>
      <input id="cSort" class="form-input" type="number" min="0" value="${cat ? cat.sort_order : nextSort}" />
    </div>
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;margin-top:2px">
      <input id="cActive" type="checkbox" ${cat?.is_active !== false ? 'checked' : ''} /> Aktif
    </label>
  `,
  `<button class="btn-add-big" style="width:100%" onclick="saveCategory(${cat ? `'${cat.id}'` : 'null'})">
     ${isNew ? 'Tambah Kategori' : 'Simpan Perubahan'}
   </button>`);
}

async function saveCategory(catId) {
  const name   = document.getElementById('cName').value.trim();
  const sort   = parseInt(document.getElementById('cSort').value) || 0;
  const active = document.getElementById('cActive').checked;

  if (!name) { adminToast('❌ Nama kategori wajib diisi'); return; }

  const payload = { name, sort_order: sort, is_active: active };

  if (catId) {
    const { error } = await window.db.from('categories').update(payload).eq('id', catId);
    if (error) { adminToast('❌ ' + error.message); return; }
    adminToast('✅ Kategori diperbarui');
  } else {
    const { error } = await window.db.from('categories').insert(payload);
    if (error) { adminToast('❌ ' + error.message); return; }
    adminToast('✅ Kategori ditambahkan');
  }

  closeModal();
  await loadCategories();
  setCat(currentCat);      // pulihkan tab aktif
  applyFilter();
}

async function toggleCategory(catId, active) {
  const { error } = await window.db.from('categories').update({ is_active: active }).eq('id', catId);
  if (error) { adminToast('❌ ' + error.message); return; }
  const c = categories.find(x => x.id === catId);
  if (c) c.is_active = active;
  adminToast(active ? '✅ Kategori diaktifkan' : '⏸ Kategori dinonaktifkan');
  await loadCategories();
  setCat(currentCat);
}

async function hapusCategory(catId) {
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  const count = allItems.filter(i => i.category_id === catId).length;
  const warn = count
    ? `\n\n${count} menu memakai kategori ini — menu tidak terhapus, hanya kategorinya dikosongkan.`
    : '';
  if (!confirm(`Hapus kategori "${cat.name}"?${warn}\n\nAksi ini tidak bisa dibatalkan.`)) return;

  const { error } = await window.db.from('categories').delete().eq('id', catId);
  if (error) { adminToast('❌ ' + error.message); return; }

  // Kategori di-set NULL pada menu_items (ON DELETE SET NULL) — sinkronkan state lokal
  allItems.forEach(i => { if (i.category_id === catId) { i.category_id = null; i.categories = null; } });
  if (currentCat === catId) currentCat = '';

  adminToast(`Kategori "${cat.name}" dihapus.`);
  closeModal();
  await loadCategories();
  setCat(currentCat);
  applyFilter();
}

async function loadItems() {
  const queries = [
    window.db.from('menu_items')
      .select(`*, categories(name),
               menu_variants(id, label, is_required, is_multi, sort_order,
                 menu_variant_options(id, name, price_modifier, is_default, sort_order))`)
      .order('sort_order').order('name'),
  ];

  // Outlet staff: muat overrides untuk outletnya
  if (!isSuperAdmin && outletData) {
    queries.push(
      window.db.from('outlet_menu_overrides')
        .select('id, menu_item_id, is_available')
        .eq('outlet_id', outletData.id)
    );
  }

  const [itemRes, overrideRes] = await Promise.all(queries);
  allItems = itemRes.data || [];

  overrideMap = {};
  if (overrideRes) {
    (overrideRes.data || []).forEach(o => { overrideMap[o.menu_item_id] = o; });
  }

  applyFilter();
}

// ─── Filter ───────────────────────────────────────────────────────────────────
function setCat(catId) {
  currentCat = catId;
  document.querySelectorAll('#catTabs .filter-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.cat === catId)
  );
  applyFilter();
}

function applyFilter() {
  const q = (document.getElementById('menuSearch')?.value || '').toLowerCase();
  let items = allItems;
  if (currentCat) items = items.filter(i => i.category_id === currentCat);
  if (q) items = items.filter(i =>
    i.name.toLowerCase().includes(q) || (i.description || '').toLowerCase().includes(q)
  );
  renderList(items);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderList(items) {
  const el = document.getElementById('menuList');
  if (items.length === 0) {
    el.innerHTML = `<div class="bg-white rounded-xl p-8 text-center border border-gray-100 shadow-sm">
      <i data-lucide="inbox" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>
      <div class="text-gray-500 font-medium">Tidak ada menu</div>
    </div>`;
    if (window.lucide) window.lucide.createIcons();
    return;
  }
  el.innerHTML = items.map(menuRow).join('') + '<div class="h-20"></div>';
  if (window.lucide) window.lucide.createIcons();
}

function menuRow(item) {
  const catName   = (item.categories || {}).name || '—';
  const varCount  = (item.menu_variants || []).length;
  const override  = overrideMap[item.id];
  // outlet_staff: tersedia kecuali override eksplisit false
  const isAvail   = override ? override.is_available : true;
  const rowOpacity = isSuperAdmin ? (item.is_active ? 1 : 0.55) : (isAvail ? 1 : 0.55);

  return `<div class="admin-order-row" style="opacity:${rowOpacity}">
    <div class="flex gap-3 items-start">
      <div class="w-14 h-14 rounded-xl shrink-0 overflow-hidden bg-gradient-to-br from-amber-100 to-orange-200 flex items-center justify-center text-2xl">
        ${item.photo_url
          ? `<img src="${item.photo_url}" class="w-full h-full object-cover" />`
          : `<i data-lucide="utensils" class="w-6 h-6 text-brand"></i>`}
      </div>
      <div class="flex-1 min-w-0">
        <div class="font-bold text-gray-800 text-sm md:text-base">${escHtml(item.name)}</div>
        <div class="text-xs text-gray-500 mt-0.5">${escHtml(catName)}${varCount ? ` · ${varCount} varian` : ''}</div>
        <div class="font-bold text-brand text-sm mt-1">${formatRupiah(item.base_price)}</div>
        ${item.is_best_seller ? `<span class="inline-flex items-center gap-1 text-[10px] bg-brand-bg text-brand px-2.5 py-0.5 rounded-full font-bold mt-1.5"><i data-lucide="star" class="w-3 h-3 fill-brand"></i> Best Seller</span>` : ''}
        ${!isSuperAdmin ? `<div class="text-[11px] mt-1.5 flex items-center gap-1 font-semibold ${isAvail ? 'text-green-600' : 'text-gray-400'}">
          <span class="inline-block w-1.5 h-1.5 rounded-full ${isAvail ? 'bg-green-600 animate-pulse' : 'bg-gray-400'}"></span>
          ${isAvail ? 'Tersedia' : 'Tidak tersedia'}
        </div>` : ''}
      </div>
      <div class="flex flex-col gap-2 items-end shrink-0">
        ${isSuperAdmin ? `
          <label class="toggle-wrap">
            <input type="checkbox" ${item.is_active ? 'checked' : ''} onchange="toggleItem('${item.id}',this.checked)" />
            <span class="toggle-slider"></span>
          </label>
          <button class="action-btn action-secondary"
                  style="font-size:11px;padding:4px 10px"
                  onclick="openItemForm('${item.id}')">Edit</button>
          <button class="action-btn action-secondary"
                  style="font-size:11px;padding:4px 10px"
                  onclick="openVariantManager('${item.id}')">Varian</button>
          <button class="action-btn action-danger"
                  style="font-size:11px;padding:4px 10px;"
                  onclick="hapusItem('${item.id}','${escHtml(item.name)}')">Hapus</button>
        ` : `
          <label class="toggle-wrap">
            <input type="checkbox" ${isAvail ? 'checked' : ''} onchange="toggleAvailability('${item.id}',this.checked)" />
            <span class="toggle-slider"></span>
          </label>
          <div class="text-[10px] text-gray-500 text-center font-medium mt-1">Tersedia</div>
        `}
      </div>
    </div>
  </div>`;
}

// ─── Hapus menu item (super_admin) ───────────────────────────────────────────
async function hapusItem(itemId, itemName) {
  if (!confirm(`Hapus menu "${itemName}"?\n\nAksi ini tidak bisa dibatalkan.`)) return;
  const { error } = await db.from('menu_items').delete().eq('id', itemId);
  if (error) { alert('Gagal hapus: ' + error.message); return; }
  showToast(`Menu "${itemName}" dihapus.`);
  loadItems();
}

// ─── Toggle aktif (super_admin — ubah is_active di menu_items) ────────────────
async function toggleItem(itemId, active) {
  const { error } = await window.db
    .from('menu_items').update({ is_active: active }).eq('id', itemId);
  if (error) { adminToast('❌ ' + error.message); return; }
  const idx = allItems.findIndex(i => i.id === itemId);
  if (idx >= 0) allItems[idx].is_active = active;
  adminToast(active ? '✅ Menu diaktifkan' : '⏸ Menu dinonaktifkan');
  applyFilter();
}

// ─── Toggle ketersediaan (outlet_staff — upsert outlet_menu_overrides) ────────
async function toggleAvailability(itemId, available) {
  if (!outletData) return;
  const { error } = await window.db
    .from('outlet_menu_overrides')
    .upsert(
      { outlet_id: outletData.id, menu_item_id: itemId, is_available: available },
      { onConflict: 'outlet_id,menu_item_id' }
    );
  if (error) { adminToast('❌ ' + error.message); return; }

  // Update local map
  if (overrideMap[itemId]) {
    overrideMap[itemId].is_available = available;
  } else {
    overrideMap[itemId] = { menu_item_id: itemId, is_available: available };
  }

  adminToast(available ? '✅ Menu tersedia' : '⏸ Menu tidak tersedia');
  applyFilter();
}

// ─── Form item ────────────────────────────────────────────────────────────────
function openItemForm(itemId) {
  const item   = itemId ? allItems.find(i => i.id === itemId) : null;
  const isNew  = !item;
  const catOpts = categories.map(c =>
    `<option value="${c.id}" ${item?.category_id === c.id ? 'selected' : ''}>${c.name}</option>`
  ).join('');

  openModal(isNew ? '+ Tambah Menu' : 'Edit Menu', `
    <div class="form-group">
      <label class="form-label">Nama Menu</label>
      <input id="iName" class="form-input" value="${item?.name || ''}" placeholder="Nama menu" />
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group">
        <label class="form-label">Harga Jual (Rp)</label>
        <input id="iPrice" class="form-input" type="number" min="0" step="500"
               value="${item?.base_price || ''}" placeholder="0" />
      </div>
      <div class="form-group">
        <label class="form-label">Harga Coret (Rp)</label>
        <input id="iCompare" class="form-input" type="number" min="0" step="500"
               value="${item?.compare_price || ''}" placeholder="Kosong = no diskon" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Kategori</label>
      <select id="iCat" class="form-input">
        <option value="">— Pilih kategori —</option>
        ${catOpts}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Deskripsi (opsional)</label>
      <textarea id="iDesc" class="form-input" rows="2"
                placeholder="Deskripsi singkat">${item?.description || ''}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Foto Menu (opsional)</label>
      <div id="photoPreviewWrap" style="margin-bottom:8px;${item?.photo_url ? '' : 'display:none'}">
        <img id="photoPreview" src="${item?.photo_url || ''}"
             style="width:100%;max-height:160px;object-fit:cover;border-radius:10px;border:1px solid var(--line2)" />
      </div>
      <input type="hidden" id="iPhoto" value="${item?.photo_url || ''}" />
      <div style="display:flex;gap:8px;align-items:center">
        <label class="action-btn action-secondary" style="font-size:12px;padding:8px 14px;cursor:pointer;margin:0">
          <i data-lucide="camera" class="w-4 h-4 mr-1 inline"></i> ${item?.photo_url ? 'Ganti Foto' : 'Upload Foto'}
          <input type="file" id="iPhotoFile" accept="image/*" style="display:none"
                 onchange="uploadMenuPhoto(this)" />
        </label>
        <span id="photoUploadStatus" style="font-size:12px;color:var(--muted)"></span>
        ${item?.photo_url ? `<button type="button" class="action-btn action-danger" style="font-size:12px;padding:8px 10px;" onclick="clearMenuPhoto()">Hapus</button>` : ''}
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Urutan Tampil</label>
      <input id="iSort" class="form-input" type="number" min="0"
             value="${item?.sort_order ?? 0}" />
    </div>
    <div style="display:flex;gap:16px;margin-top:6px">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px">
        <input id="iActive" type="checkbox" ${item?.is_active !== false ? 'checked' : ''} /> Aktif
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px">
        <input id="iBest" type="checkbox" ${item?.is_best_seller ? 'checked' : ''} /> Best Seller
      </label>
    </div>
  `,
  `<button class="btn-add-big" style="width:100%"
           onclick="saveItem(${item ? `'${item.id}'` : 'null'})">
     ${isNew ? 'Tambah Menu' : 'Simpan Perubahan'}
   </button>`);

  if (window.lucide) {
    window.lucide.createIcons();
  }
}

// ─── Upload foto menu ke Supabase Storage ────────────────────────────────────
async function uploadMenuPhoto(input) {
  const file = input.files[0];
  if (!file) return;

  const statusEl = document.getElementById('photoUploadStatus');
  statusEl.textContent = 'Mengupload…';

  // Validasi ukuran max 2MB
  if (file.size > 2 * 1024 * 1024) {
    statusEl.style.color = '#e16900';
    statusEl.textContent = '❌ Ukuran maks 2MB';
    input.value = '';
    return;
  }

  const ext  = file.name.split('.').pop().toLowerCase();
  const path = `menu/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;

  const { error } = await window.db.storage
    .from('menu-photo')
    .upload(path, file, { upsert: false, contentType: file.type });

  if (error) {
    statusEl.style.color = '#e16900';
    statusEl.textContent = '❌ ' + error.message;
    return;
  }

  const { data: urlData } = window.db.storage.from('menu-photo').getPublicUrl(path);
  const publicUrl = urlData.publicUrl;

  document.getElementById('iPhoto').value = publicUrl;
  document.getElementById('photoPreview').src = publicUrl;
  document.getElementById('photoPreviewWrap').style.display = '';
  statusEl.style.color = '#10b981';
  statusEl.textContent = '✅ Foto berhasil diupload';
}

function clearMenuPhoto() {
  document.getElementById('iPhoto').value = '';
  document.getElementById('photoPreview').src = '';
  document.getElementById('photoPreviewWrap').style.display = 'none';
  document.getElementById('photoUploadStatus').textContent = '';
  const fileInput = document.getElementById('iPhotoFile');
  if (fileInput) fileInput.value = '';
}

async function saveItem(itemId) {
  const name    = document.getElementById('iName').value.trim();
  const price   = parseFloat(document.getElementById('iPrice').value);
  const compare = parseFloat(document.getElementById('iCompare').value) || null;
  const catId   = document.getElementById('iCat').value || null;
  const desc    = document.getElementById('iDesc').value.trim() || null;
  const photo   = document.getElementById('iPhoto').value.trim() || null;
  const sort    = parseInt(document.getElementById('iSort').value) || 0;
  const active  = document.getElementById('iActive').checked;
  const best    = document.getElementById('iBest').checked;

  if (!name)                        { adminToast('❌ Nama wajib diisi'); return; }
  if (isNaN(price) || price < 0)    { adminToast('❌ Harga tidak valid'); return; }
  if (compare !== null && compare <= price) { adminToast('❌ Harga coret harus lebih besar dari harga jual'); return; }

  const payload = {
    name, base_price: price, compare_price: compare, category_id: catId,
    description: desc, photo_url: photo,
    sort_order: sort, is_active: active, is_best_seller: best,
  };

  if (itemId) {
    const { error } = await window.db.from('menu_items').update(payload).eq('id', itemId);
    if (error) { adminToast('❌ ' + error.message); return; }
    const idx = allItems.findIndex(i => i.id === itemId);
    if (idx >= 0) allItems[idx] = { ...allItems[idx], ...payload };
    adminToast('✅ Menu diperbarui');
  } else {
    const { data, error } = await window.db
      .from('menu_items').insert(payload).select('*, categories(name)').single();
    if (error) { adminToast('❌ ' + error.message); return; }
    allItems.unshift({ ...data, menu_variants: [] });
    adminToast('✅ Menu ditambahkan');
  }

  closeModal();
  applyFilter();
}

// ─── Variant manager ──────────────────────────────────────────────────────────
function openVariantManager(itemId) {
  const item = allItems.find(i => i.id === itemId);
  if (!item) return;

  const variants = item.menu_variants || [];

  const varHtml = variants.length === 0
    ? `<div class="text-gray-400 text-xs py-2">Belum ada varian</div>`
    : variants.sort((a, b) => a.sort_order - b.sort_order).map(v => {
        const opts = (v.menu_variant_options || [])
          .sort((a, b) => a.sort_order - b.sort_order)
          .map(o => `<div class="flex justify-between items-center py-1 pl-3 text-xs text-gray-500 border-b border-gray-50">
            <span class="flex items-center gap-1">${escHtml(o.name)}${o.is_default ? ' <i data-lucide="star" class="w-3.5 h-3.5 text-yellow-400 fill-yellow-400"></i>' : ''}</span>
            <span>${o.price_modifier > 0 ? '+' + formatRupiah(o.price_modifier) : o.price_modifier < 0 ? formatRupiah(o.price_modifier) : 'Gratis'}</span>
          </div>`).join('');
        return `<div class="bg-gray-50 rounded-xl p-3 mb-2.5">
          <div class="flex justify-between items-center mb-1.5">
            <span class="font-semibold text-xs md:text-sm text-gray-800">${escHtml(v.label)}</span>
            <div class="flex gap-1">
              <span class="text-[10px] bg-white border border-gray-200 text-gray-500 px-1.5 py-0.5 rounded">${v.is_required ? 'Wajib' : 'Opsional'}</span>
              <span class="text-[10px] bg-white border border-gray-200 text-gray-500 px-1.5 py-0.5 rounded">${v.is_multi ? 'Multi' : 'Pilih 1'}</span>
            </div>
          </div>
          <div class="space-y-1">${opts}</div>
          ${isSuperAdmin ? `<div class="flex gap-1.5 mt-2.5">
            <button class="action-btn action-secondary" style="font-size:10px;padding:3px 8px" onclick="openVariantForm('${itemId}','${v.id}')">Edit Varian</button>
            <button class="action-btn action-secondary" style="font-size:10px;padding:3px 8px" onclick="openOptionForm('${v.id}',null)">+ Opsi</button>
          </div>` : ''}
        </div>`;
      }).join('');

  openModal(`Varian: ${escHtml(item.name)}`, `
    ${varHtml}
    ${isSuperAdmin ? `<button class="action-btn action-primary" style="width:100%;margin-top:8px;padding:10px" onclick="openVariantForm('${itemId}',null)"><i data-lucide="plus" class="w-4 h-4 mr-1"></i> Tambah Varian</button>` : ''}
  `);
  if (window.lucide) {
    window.lucide.createIcons();
  }
}

// ─── Form varian ──────────────────────────────────────────────────────────────
function openVariantForm(itemId, variantId) {
  const item    = allItems.find(i => i.id === itemId);
  const variant = variantId
    ? (item?.menu_variants || []).find(v => v.id === variantId) : null;
  const isNew = !variant;

  openModal(isNew ? '+ Tambah Varian' : 'Edit Varian', `
    <div class="form-group">
      <label class="form-label">Label Varian</label>
      <input id="vLabel" class="form-input" value="${variant?.label || ''}" placeholder="Pilihan Ukuran" />
    </div>
    <div class="form-group">
      <label class="form-label">Urutan</label>
      <input id="vSort" class="form-input" type="number" min="0" value="${variant?.sort_order ?? 0}" />
    </div>
    <div style="display:flex;gap:16px;margin-top:6px">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px">
        <input id="vReq" type="checkbox" ${variant?.is_required ? 'checked' : ''} /> Wajib dipilih
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px">
        <input id="vMulti" type="checkbox" ${variant?.is_multi ? 'checked' : ''} /> Pilih banyak
      </label>
    </div>
  `,
  `<button class="btn-add-big" style="width:100%"
           onclick="saveVariant('${itemId}',${variantId ? `'${variantId}'` : 'null'})">
     ${isNew ? 'Tambah Varian' : 'Simpan'}
   </button>`);
  if (window.lucide) {
    window.lucide.createIcons();
  }
}

async function saveVariant(itemId, variantId) {
  const label = document.getElementById('vLabel').value.trim();
  const sort  = parseInt(document.getElementById('vSort').value) || 0;
  const req   = document.getElementById('vReq').checked;
  const multi = document.getElementById('vMulti').checked;

  if (!label) { adminToast('❌ Label wajib diisi'); return; }

  const payload = { label, sort_order: sort, is_required: req, is_multi: multi };

  if (variantId) {
    const { error } = await window.db.from('menu_variants').update(payload).eq('id', variantId);
    if (error) { adminToast('❌ ' + error.message); return; }
  } else {
    const { data, error } = await window.db
      .from('menu_variants').insert({ ...payload, menu_item_id: itemId }).select().single();
    if (error) { adminToast('❌ ' + error.message); return; }
    const item = allItems.find(i => i.id === itemId);
    if (item) item.menu_variants = [...(item.menu_variants || []), { ...data, menu_variant_options: [] }];
  }

  adminToast(variantId ? '✅ Varian diperbarui' : '✅ Varian ditambahkan');
  closeModal();
  await loadItems();
  openVariantManager(itemId);
}

// ─── Form opsi varian ─────────────────────────────────────────────────────────
function openOptionForm(variantId, optionId) {
  let opt = null;
  for (const item of allItems) {
    for (const v of (item.menu_variants || [])) {
      if (v.id === variantId) {
        opt = optionId ? (v.menu_variant_options || []).find(o => o.id === optionId) : null;
        break;
      }
    }
  }
  const isNew = !opt;

  openModal(isNew ? '+ Tambah Opsi' : 'Edit Opsi', `
    <div class="form-group">
      <label class="form-label">Nama Opsi</label>
      <input id="oName" class="form-input" value="${opt?.name || ''}" placeholder="Regular" />
    </div>
    <div class="form-group">
      <label class="form-label">Tambahan Harga (Rp, 0 = gratis)</label>
      <input id="oMod" class="form-input" type="number" step="500" value="${opt?.price_modifier ?? 0}" />
    </div>
    <div class="form-group">
      <label class="form-label">Urutan</label>
      <input id="oSort" class="form-input" type="number" min="0" value="${opt?.sort_order ?? 0}" />
    </div>
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;margin-top:6px">
      <input id="oDef" type="checkbox" ${opt?.is_default ? 'checked' : ''} /> Default terpilih
    </label>
  `,
  `<button class="btn-add-big" style="width:100%"
           onclick="saveOption('${variantId}',${optionId ? `'${optionId}'` : 'null'})">
     ${isNew ? 'Tambah Opsi' : 'Simpan'}
   </button>`);
  if (window.lucide) {
    window.lucide.createIcons();
  }
}

async function saveOption(variantId, optionId) {
  const name = document.getElementById('oName').value.trim();
  const mod  = parseFloat(document.getElementById('oMod').value) || 0;
  const sort = parseInt(document.getElementById('oSort').value)  || 0;
  const def  = document.getElementById('oDef').checked;

  if (!name) { adminToast('❌ Nama wajib diisi'); return; }

  const payload = { name, price_modifier: mod, sort_order: sort, is_default: def };

  if (optionId) {
    const { error } = await window.db.from('menu_variant_options').update(payload).eq('id', optionId);
    if (error) { adminToast('❌ ' + error.message); return; }
  } else {
    const { error } = await window.db
      .from('menu_variant_options').insert({ ...payload, variant_id: variantId });
    if (error) { adminToast('❌ ' + error.message); return; }
  }

  adminToast(optionId ? '✅ Opsi diperbarui' : '✅ Opsi ditambahkan');
  closeModal();
  await loadItems();

  // Temukan item parent untuk buka ulang variant manager
  for (const item of allItems) {
    if ((item.menu_variants || []).some(v => v.id === variantId)) {
      openVariantManager(item.id);
      break;
    }
  }
}
</script>
