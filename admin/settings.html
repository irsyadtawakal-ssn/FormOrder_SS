      <a href="/admin/promos.html" class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="tag" class="w-5 h-5"></i><span>Promo</span></a>

      <a href="/admin/users.html" class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="user-cog" class="w-5 h-5"></i><span>Pengguna</span></a>

  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col h-full overflow-hidden relative">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between shadow-sm z-10">
      <div class="flex items-center gap-3">
        <img src="../assets/img/logo.png" alt="SUKA" class="h-8 w-auto md:hidden" onerror="this.style.display='none'">
        <div class="hidden md:flex items-center gap-2 font-bold text-gray-800 text-lg">

      <button onclick="adminSignOut()" class="md:hidden flex items-center gap-1 text-xs font-bold text-red-600 bg-red-50 px-3 py-1.5 rounded-full">

    <!-- Scrollable Content Area -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8 bg-brand-bg/50">

  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex items-center justify-around pb-safe pt-1 z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">

    <a href="/admin/orders.html" class="flex flex-col items-center gap-1 py-2 px-2 text-gray-500 hover:text-brand"><i data-lucide="clipboard-list" class="w-5 h-5"></i><span class="text-[10px] font-medium">Pesanan</span></a>
    <a href="/admin/menu.html" class="flex flex-col items-center gap-1 py-2 px-2 text-gray-500 hover:text-brand"><i data-lucide="utensils" class="w-5 h-5"></i><span class="text-[10px] font-medium">Menu</span></a>

    <a href="/admin/settings.html" class="admin-only flex flex-col items-center gap-1 py-2 px-2 text-brand"><i data-lucide="settings" class="w-5 h-5"></i><span class="text-[10px] font-bold">Settings</span></a>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../config.js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/admin.js?v=2"></script>
<script>
let settings   = {}; // key → { id, value, description }
let templates  = []; // notification_templates rows

(async function init() {
  const u = await requireSuperAdmin();
  if (!u) return;
  await Promise.all([loadSettings(), loadTemplates()]);
  renderPage();
  // Perbaiki otomatis banner/logo lama yang resolusinya kebesaran (gagal muncul
  // di HP). Jalan di latar belakang — tidak memblok render halaman.
  autoHealHeroImages();
})();

async function loadSettings() {
  const { data } = await window.db
    .from('app_settings')
    .select('key, value');
  (data || []).forEach(row => { settings[row.key] = row; });
}

async function loadTemplates() {
  const { data } = await window.db
    .from('notification_templates')
    .select('*')
    .order('key');
  templates = data || [];
}

function val(key, fallback = '') {
  return settings[key]?.value ?? fallback;
}

const _cardTitle = (icon, text) =>
  `<div style="font-weight:700;font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px"><i data-lucide="${icon}" class="w-4 h-4 text-brand"></i> ${text}</div>`;

function renderPage() {
  const pc   = document.getElementById('pageContent');
  pc.innerHTML = `

    <!-- ── Banner & Tampilan ──────────────────────────────────────── -->
    <div class="info-card" style="margin-bottom:12px">
      ${_cardTitle('image', 'Banner Utama (Hero Banner)')}

      <div class="form-group">
        <label class="form-label">Ubah Banner</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="file" id="bannerInput" accept="image/jpeg, image/png, image/webp"
                 class="form-input" style="flex:1;padding:6px"
                 onchange="uploadBannerPhoto(this)" />
        </div>
        <div id="bannerStatus" style="font-size:11px;color:var(--muted);margin-top:4px">Ukuran ideal: 800x400px. Gambar otomatis dikecilkan supaya muncul di HP.</div>
      </div>
      <div style="margin-top:10px;border-radius:8px;overflow:hidden;border:1px solid var(--line);background:#f0f0f0;position:relative;height:120px">
        <img id="bannerPreview" src="${val('hero_banner_url', '../assets/img/hero-bg.jpg')}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'" />
      </div>
    </div>

    <!-- ── Logo ──────────────────────────────────────── -->
    <div class="info-card" style="margin-bottom:12px">
      ${_cardTitle('sparkles', 'Logo Banner')}

      <div class="form-group">
        <label class="form-label">Ubah Logo</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="file" id="logoInput" accept="image/jpeg, image/png, image/webp"
                 class="form-input" style="flex:1;padding:6px"
                 onchange="uploadLogoPhoto(this)" />
        </div>
        <div id="logoStatus" style="font-size:11px;color:var(--muted);margin-top:4px">Disarankan PNG transparan, rasio kotak atau memanjang.</div>
      </div>
      <div style="margin-top:10px;border-radius:8px;overflow:hidden;border:1px solid var(--line);background:#f0f0f0;position:relative;height:80px;display:flex;align-items:center;justify-content:center;padding:10px">
        <img id="logoPreview" src="${val('hero_logo_url', '../assets/img/logo.png')}" style="max-width:100%;max-height:100%;object-fit:contain" onerror="this.style.display='none'" />
      </div>
    </div>

    <!-- ── Biaya Layanan ──────────────────────────────────────── -->
    <div class="info-card" style="margin-bottom:12px">
      ${_cardTitle('wallet', 'Biaya Layanan')}

      <div class="form-group">
        <label class="form-label">Service Fee (%)</label>
        <input id="sFee" class="form-input" type="number" min="0" max="100" step="0.1"
               value="${parseFloat(val('service_fee_percent', '0.7')).toFixed(1)}"
               placeholder="0.7" />
        <div style="font-size:11px;color:var(--muted);margin-top:4px">Contoh: 0.7 = 0.7% dari subtotal</div>
      </div>

      <div class="form-group">
        <label class="form-label">Waktu Kedaluwarsa QRIS (menit)</label>
        <input id="sExpire" class="form-input" type="number" min="5" max="1440" step="5"
               value="${parseInt(val('qris_expire_minutes', '15'))}" placeholder="15" />
      </div>

      <div style="margin-top:4px">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px">
          <input id="sPassthrough" type="checkbox"
                 ${val('service_fee_passthrough', true) != false ? 'checked' : ''} />
          Biaya layanan ditanggung customer (direkomendasikan)
        </label>
      </div>

      <button class="btn-add-big" style="width:100%;margin-top:16px" onclick="saveSettings()">
        Simpan Pengaturan
      </button>
    </div>

    <!-- ── Tracking & Pixel ──────────────────────────────────────── -->
    <div class="info-card" style="margin-bottom:12px">
      ${_cardTitle('bar-chart-3', 'Tracking &amp; Pixel')}

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--line)">
        <div>
          <div style="font-weight:600;font-size:13px">Aktifkan Meta Pixel</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Tracking iklan Facebook & Instagram</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="pixelEnabled"
            ${val('meta_pixel_enabled','false') === 'true' ? 'checked' : ''}
            onchange="savePixelEnabled(this.checked)">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="form-group">
        <label class="form-label">Meta Pixel ID</label>
        <input id="pixelId" class="form-input" type="text" inputmode="numeric"
               value="${val('meta_pixel_id', '')}"
               placeholder="Contoh: 1234567890123456" maxlength="20" />
        <div style="font-size:11px;color:var(--muted);margin-top:4px">
          Cek di <b>Meta Events Manager → Data Sources → Pixel ID</b>
        </div>
      </div>

      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Meta Access Token</label>
        <div style="display:flex;gap:8px;align-items:flex-start">
          <input id="pixelToken" class="form-input" type="password"
                 placeholder="Tempel token dari Meta Apps"
                 style="flex:1" />
          <button class="action-btn action-secondary" style="margin-top:0;white-space:nowrap"
                  onclick="clearPixelToken()">Hapus</button>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">
          Token disimpan terenkripsi. <b>Jangan share</b> dengan orang lain.
        </div>
        ${val('meta_pixel_token_exists','false') === 'true'
          ? `<div style="font-size:11px;color:var(--success);margin-top:4px;display:flex;align-items:center;gap:4px"><i data-lucide="check-circle" class="w-3.5 h-3.5"></i> Token sudah tersimpan (${val('meta_pixel_token_masked','')})</div>`
          : ''}
      </div>

      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="btn-add-big" style="flex:1" onclick="savePixelSettings()">
          Simpan Pengaturan Pixel
        </button>
      </div>
    </div>

    <!-- ── Bulk Import ──────────────────────────────────────────── -->
    <div class="info-card" style="margin-bottom:12px">
      ${_cardTitle('upload', 'Bulk Import')}
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">Import data dalam jumlah besar via CSV</div>
      <a href="/admin/import.html" class="btn-outline" style="display:flex;width:100%;text-align:center;margin-bottom:0">
        Buka Halaman Import →
      </a>
    </div>

    <!-- ── Manajemen Pengguna ───────────────────────────────────── -->
    <div class="info-card" style="margin-bottom:12px">
      ${_cardTitle('user-cog', 'Manajemen Pengguna')}
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">Buat dan kelola akun outlet staff</div>
      <a href="/admin/users.html" class="btn-outline" style="display:flex;width:100%;text-align:center;margin-bottom:0">
        Kelola Pengguna →
      </a>
    </div>

    <!-- ── Notification Templates ──────────────────────────────── -->
    <div style="font-weight:700;font-size:14px;margin-bottom:8px;margin-top:4px;display:flex;align-items:center;gap:8px">
      <i data-lucide="message-circle" class="w-4 h-4 text-brand"></i> Template Notifikasi WhatsApp
    </div>
    ${templates.length === 0
      ? `<div class="hint-banner">Template belum ada. Jalankan seed SQL untuk menambahkan template default.</div>`
      : templates.map(tmplCard).join('')
    }

    <!-- ── Program Loyalty ───────────────────────────────────── -->
    <div class="info-card" style="margin-bottom:12px">
      ${_cardTitle('gift', 'Program Loyalty')}

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--line)">
        <div>
          <div style="font-weight:600;font-size:13px">Aktifkan Program Loyalty</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Customer dapat voucher saat milestone tercapai</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="loyaltyEnabled"
            ${val('loyalty_enabled','false') === 'true' ? 'checked' : ''}
            onchange="saveLoyaltySetting('loyalty_enabled', this.checked ? 'true' : 'false')">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--line)">
        <div>
          <div style="font-weight:600;font-size:13px">Notif WA Otomatis</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Kirim WA ke customer saat dapat voucher</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="loyaltyNotifAuto"
            ${val('loyalty_notif_auto','false') === 'true' ? 'checked' : ''}
            onchange="saveLoyaltySetting('loyalty_notif_auto', this.checked ? 'true' : 'false')">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px">MILESTONE & REWARD</div>
      ${[1,2,3].map(n => loyaltyMilestoneRow(n)).join('')}
    </div>

    <div style="height:80px"></div>
  `;
  if (window.lucide) window.lucide.createIcons();
}

function loyaltyMilestoneRow(n) {
  const count  = val(`loyalty_milestone_${n}`, n === 1 ? '5' : n === 2 ? '10' : '20');
  const reward = val(`loyalty_reward_${n}`, '');
  return `
    <div style="border:1px solid var(--line2);border-radius:10px;padding:12px;margin-bottom:8px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px">MILESTONE ${n}</div>
      <div style="display:flex;gap:8px">
        <div style="flex-shrink:0;width:80px">
          <label style="font-size:11px;color:var(--muted)">Order ke-</label>
          <input type="number" class="form-input" style="font-size:13px;padding:7px 8px;margin-top:3px"
            value="${count}" min="1"
            onchange="saveLoyaltySetting('loyalty_milestone_${n}', this.value)">
        </div>
        <div style="flex:1">
          <label style="font-size:11px;color:var(--muted)">Reward</label>
          <input type="text" class="form-input" style="font-size:13px;padding:7px 8px;margin-top:3px"
            value="${reward}" placeholder="Deskripsi reward..."
            onchange="saveLoyaltySetting('loyalty_reward_${n}', this.value)">
        </div>
      </div>
    </div>`;
}

async function saveLoyaltySetting(key, value) {
  const { error } = await window.db
    .from('app_settings')
    .upsert({ key, value, updated_at: new Date().toISOString() }, { onConflict: 'key' });
  if (error) { adminToast('❌ Gagal simpan'); return; }
  settings[key] = { key, value };
  adminToast('✅ Tersimpan');
}

function tmplCard(tmpl) {
  const keyLabels = {
    new_order_admin:    '<i data-lucide="bell" class="w-3.5 h-3.5 inline"></i> Order Baru → Admin',
    new_order_outlet:   '<i data-lucide="bell" class="w-3.5 h-3.5 inline"></i> Order Baru → Outlet',
    paid_customer:      '<i data-lucide="check-circle" class="w-3.5 h-3.5 inline"></i> Pembayaran Sukses → Customer',
    ready_customer:     '<i data-lucide="party-popper" class="w-3.5 h-3.5 inline"></i> Pesanan Siap → Customer',
    cancelled_customer: '<i data-lucide="x-circle" class="w-3.5 h-3.5 inline"></i> Dibatalkan → Customer',
  };
  const label = keyLabels[tmpl.key] || tmpl.key;

  return `<div class="info-card" style="margin-bottom:10px">
    <div style="font-weight:600;font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:6px">${label}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:6px">
      Variabel: {{order_number}}, {{customer_name}}, {{outlet_name}}, {{total}}, {{pickup_time}}
    </div>
    <textarea id="tmpl-${tmpl.id}" class="form-input" rows="4"
              style="font-size:12px;font-family:monospace">${tmpl.body_template || ''}</textarea>
    <button class="action-btn action-secondary" style="margin-top:8px;width:100%"
            onclick="saveTemplate('${tmpl.id}')">Simpan Template</button>
  </div>`;
}

// ─── Pixel ────────────────────────────────────────────────────────────────────
async function savePixelEnabled(enabled) {
  const val = enabled ? 'true' : 'false';
  const { error } = await window.db
    .from('app_settings')
    .upsert({ key: 'meta_pixel_enabled', value: val, updated_at: new Date().toISOString() }, { onConflict: 'key' });
  if (error) { adminToast('❌ Gagal simpan'); return; }
  settings['meta_pixel_enabled'] = { key: 'meta_pixel_enabled', value: val };
  adminToast('✅ Tersimpan');
}

async function savePixelSettings() {
  const pixelId = document.getElementById('pixelId').value.trim();
  const pixelToken = document.getElementById('pixelToken').value.trim();

  // Validasi Pixel ID
  if (pixelId && !/^\d{10,20}$/.test(pixelId)) {
    adminToast('❌ Pixel ID tidak valid (10–20 digit angka)'); return;
  }

  // Validasi token (jika ada, harus format Meta token)
  if (pixelToken && pixelToken.length < 100) {
    adminToast('❌ Token tidak valid (terlalu pendek)'); return;
  }

  const upserts = [
    { key: 'meta_pixel_id', value: pixelId, updated_at: new Date().toISOString() },
  ];

  // Jika ada token baru, simpan
  if (pixelToken) {
    const lastChars = pixelToken.slice(-8);
    upserts.push({ key: 'meta_pixel_token', value: pixelToken, updated_at: new Date().toISOString() });
    upserts.push({ key: 'meta_pixel_token_exists', value: 'true', updated_at: new Date().toISOString() });
    upserts.push({ key: 'meta_pixel_token_masked', value: `...${lastChars}`, updated_at: new Date().toISOString() });
  }

  const { error } = await window.db
    .from('app_settings')
    .upsert(upserts, { onConflict: 'key' });

  if (error) { adminToast('❌ ' + error.message); return; }

  // Update state lokal
  settings['meta_pixel_id'] = { key: 'meta_pixel_id', value: pixelId };
  if (pixelToken) {
    const lastChars = pixelToken.slice(-8);
    settings['meta_pixel_token_exists'] = { key: 'meta_pixel_token_exists', value: 'true' };
    settings['meta_pixel_token_masked'] = { key: 'meta_pixel_token_masked', value: `...${lastChars}` };
  }

  // Clear input field setelah simpan
  document.getElementById('pixelToken').value = '';
  adminToast('✅ Pengaturan Pixel disimpan');
}

async function clearPixelToken() {
  if (!confirm('Hapus token Meta? Ini tidak bisa dibatalkan.')) return;

  const { error } = await window.db
    .from('app_settings')
    .delete()
    .in('key', ['meta_pixel_token', 'meta_pixel_token_exists', 'meta_pixel_token_masked']);

  if (error) { adminToast('❌ ' + error.message); return; }

  delete settings['meta_pixel_token'];
  delete settings['meta_pixel_token_exists'];
  delete settings['meta_pixel_token_masked'];

  document.getElementById('pixelToken').value = '';
  renderPage();
  adminToast('✅ Token dihapus');
}

// ─── Upload Banner ─────────────────────────────────────────────────────────────
// Resize gambar di browser sebelum upload — cegah gambar megapixel tinggi
// yang gagal dirender di HP (browser mobile punya batas decode megapixel).
function resizeImageFile(file, maxW, maxH, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const objUrl = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(objUrl);
      let { width, height } = img;
      // Hanya kecilkan kalau melebihi batas (jangan memperbesar)
      const scale = Math.min(1, maxW / width, maxH / height);
      width = Math.round(width * scale);
      height = Math.round(height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      // Selalu ekspor ke WebP — ukuran kecil & dijamin bisa dirender di HP,
      // apapun format aslinya (jpg/png/dll). Fallback ke JPEG kalau browser
      // admin tak mendukung WebP.
      const done = (blob, type) =>
        blob ? resolve({ blob, type }) : reject(new Error('Gagal memproses gambar'));
      canvas.toBlob(
        (blob) => {
          if (blob) return done(blob, 'image/webp');
          canvas.toBlob((jpg) => done(jpg, 'image/jpeg'), 'image/jpeg', quality);
        },
        'image/webp',
        quality
      );
    };
    img.onerror = () => {
      URL.revokeObjectURL(objUrl);
      reject(new Error('File gambar tidak valid'));
    };
    img.src = objUrl;
  });
}

// ─── Auto-heal gambar lama yang kebesaran ───────────────────────────────────
// Banner/logo yang diupload SEBELUM ada resize otomatis bisa beresolusi sangat
// besar (megapixel tinggi) sehingga gagal dirender di HP. Saat super admin buka
// halaman ini, kita deteksi & kecilkan otomatis lalu simpan ulang — tanpa perlu
// admin upload manual. Hanya jalan sekali per gambar (setelah dikecilkan, lebar
// sudah ≤ batas jadi dilewati).
function loadImageCORS(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous'; // wajib supaya canvas tak ter-taint & bisa diekspor
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('gagal load'));
    img.src = url;
  });
}

async function healOneImage(settingKey, maxDim, prefix) {
  const url = val(settingKey);
  // Hanya proses file milik kita di Supabase Storage publik
  if (!url || !url.includes('/storage/v1/object/public/')) return;

  let img;
  try { img = await loadImageCORS(url); } catch { return; } // tak terakses → lewati
  // Sudah aman untuk HP → tidak perlu apa-apa
  if (img.naturalWidth <= maxDim && img.naturalHeight <= maxDim) return;

  const scale = Math.min(1, maxDim / img.naturalWidth, maxDim / img.naturalHeight);
  const w = Math.round(img.naturalWidth * scale);
  const h = Math.round(img.naturalHeight * scale);
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);

  let blob, type;
  try {
    blob = await new Promise((res) => canvas.toBlob(res, 'image/webp', 0.85));
    type = 'image/webp';
    if (!blob) {
      blob = await new Promise((res) => canvas.toBlob(res, 'image/jpeg', 0.85));
      type = 'image/jpeg';
    }
  } catch { return; } // SecurityError (taint) → lewati diam-diam
  if (!blob) return;

  const ext = type === 'image/webp' ? 'webp' : 'jpg';
  const path = `assets/${prefix}-${Date.now()}.${ext}`;
  const { error: upErr } = await window.db.storage.from('menu_assets')
    .upload(path, blob, { upsert: false, contentType: type });
  if (upErr) return;

  const { data: pub } = window.db.storage.from('menu_assets').getPublicUrl(path);
  const newUrl = pub.publicUrl;
  const { error: saveErr } = await window.db.from('app_settings')
    .upsert({ key: settingKey, value: newUrl, updated_at: new Date().toISOString() }, { onConflict: 'key' });
  if (saveErr) return;

  settings[settingKey] = { key: settingKey, value: newUrl };
  const previewId = settingKey === 'hero_banner_url' ? 'bannerPreview' : 'logoPreview';
  const el = document.getElementById(previewId);
  if (el) { el.src = newUrl; el.style.display = 'block'; }
  adminToast('✅ Gambar dioptimalkan otomatis agar muncul di HP');
}

async function autoHealHeroImages() {
  try {
    await healOneImage('hero_banner_url', 1280, 'banner');
    await healOneImage('hero_logo_url', 480, 'logo');
  } catch { /* jangan sampai mengganggu halaman */ }
}

async function uploadBannerPhoto(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  if (file.size > 2 * 1024 * 1024) { adminToast('❌ Ukuran maksimal 2MB'); return; }

  const statusEl = document.getElementById('bannerStatus');
  statusEl.textContent = 'Memproses gambar…';

  // Kecilkan ke max 1280px lebar (≈0.8MP) + konversi ke WebP supaya aman
  // dirender di HP, apapun format aslinya (jpg/png/dll).
  let uploadBlob, contentType;
  try {
    const out = await resizeImageFile(file, 1280, 1280, 0.85);
    uploadBlob = out.blob;
    contentType = out.type;
  } catch (e) {
    statusEl.textContent = '❌ ' + e.message;
    return;
  }

  statusEl.textContent = 'Mengupload…';
  const ext = contentType === 'image/webp' ? 'webp' : 'jpg';
  const path = `assets/banner-${Date.now()}.${ext}`;

  const { error: uploadErr } = await window.db.storage.from('menu_assets')
    .upload(path, uploadBlob, { upsert: false, contentType });

  if (uploadErr) {
    statusEl.textContent = '❌ Gagal upload: ' + uploadErr.message;
    return;
  }

  const { data: publicUrlData } = window.db.storage.from('menu_assets').getPublicUrl(path);
  const url = publicUrlData.publicUrl;

  const { error: saveErr } = await window.db.from('app_settings')
    .upsert({ key: 'hero_banner_url', value: url, updated_at: new Date().toISOString() }, { onConflict: 'key' });

  if (saveErr) {
    statusEl.textContent = '❌ Gagal menyimpan URL: ' + saveErr.message;
    return;
  }

  statusEl.textContent = '✅ Banner berhasil diperbarui';
  document.getElementById('bannerPreview').src = url;
  document.getElementById('bannerPreview').style.display = 'block';
  settings['hero_banner_url'] = { key: 'hero_banner_url', value: url };
  adminToast('✅ Banner diperbarui');
}

// ─── Simpan app_settings ──────────────────────────────────────────────────────
async function saveSettings() {
  const fee        = parseFloat(document.getElementById('sFee').value);
  const expire     = parseInt(document.getElementById('sExpire').value);
  const passthrough = document.getElementById('sPassthrough').checked;

  if (isNaN(fee) || fee < 0 || fee > 100) { adminToast('❌ Service fee tidak valid (0–100%)'); return; }
  if (isNaN(expire) || expire < 5)         { adminToast('❌ Waktu minimal 5 menit'); return; }

  const upserts = [
    { key: 'service_fee_percent',    value: fee,         updated_at: new Date().toISOString() },
    { key: 'qris_expire_minutes',    value: expire,      updated_at: new Date().toISOString() },
    { key: 'service_fee_passthrough',value: passthrough, updated_at: new Date().toISOString() },
  ];

  const { error } = await window.db
    .from('app_settings')
    .upsert(upserts, { onConflict: 'key' });

  if (error) { adminToast('❌ ' + error.message); return; }
  adminToast('✅ Pengaturan disimpan');
}

// ─── Simpan satu notification template ───────────────────────────────────────
async function saveTemplate(templateId) {
  const body = document.getElementById(`tmpl-${templateId}`)?.value?.trim();
  if (!body) { adminToast('❌ Template tidak boleh kosong'); return; }

  const { error } = await window.db
    .from('notification_templates')
    .update({ body_template: body })
    .eq('id', templateId);

  if (error) { adminToast('❌ ' + error.message); return; }
  const idx = templates.findIndex(t => t.id === templateId);
  if (idx >= 0) templates[idx].body = body;
  adminToast('✅ Template disimpan');
}
