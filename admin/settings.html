<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Pengaturan — SUKA Admin</title>
<link rel="stylesheet" href="../assets/css/style.css?v=5" />
<link rel="stylesheet" href="../assets/css/admin-desktop.css?v=5" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#f29744" />
</head>
<body>
<div class="phone">

  <!-- Sidebar — hanya muncul di tablet/desktop via CSS -->
  <aside class="admin-sidebar" style="display:none">
    <div class="admin-sidebar-logo">🌯 SUKA Admin</div>
    <div class="admin-sidebar-user">
      <div class="name" id="sidebarName">—</div>
      <div class="role" id="sidebarRole">—</div>
    </div>
    <nav class="admin-sidebar-nav">
      <a href="/admin/index.html"><span>🏠</span><span>Dashboard</span></a>
      <a href="/admin/orders.html"><span>📋</span><span>Pesanan</span></a>
      <a href="/admin/menu.html"><span>🌯</span><span>Menu</span></a>
      <a href="/admin/reports.html"><span>📊</span><span>Laporan</span></a>
      <a href="/admin/customers.html" class="admin-only"><span>🧑‍🤝‍🧑</span><span>Pelanggan</span></a>
      <a href="/admin/vouchers.html" class="admin-only"><span>🎟️</span><span>Voucher</span></a>
      <a href="/admin/outlets.html" class="admin-only"><span>📍</span><span>Outlet</span></a>
      <a href="/admin/users.html" class="admin-only"><span>👥</span><span>Pengguna</span></a>
      <a href="/admin/settings.html" class="admin-only"><span>⚙️</span><span>Pengaturan</span></a>
    </nav>
    <div class="admin-sidebar-footer">
      <button onclick="adminSignOut()">🚪 Keluar</button>
    </div>
  </aside>

  <!-- Topbar -->
  <div class="topbar">
    <span class="topbar-title">⚙️ Pengaturan</span>
    <span style="width:32px"></span>
  </div>

  <div class="admin-content">

  <!-- Konten -->
  <div id="pageContent" style="padding:0">
    <div class="skeleton-card"><div class="skeleton-lines">
      <div class="skeleton skeleton-line"></div>
      <div class="skeleton skeleton-line short"></div>
    </div></div>
  </div>

  </div><!-- /admin-content -->

  <!-- Bottom nav -->
  <nav class="admin-nav">
    <a href="/admin/index.html"><span>🏠</span><span>Dashboard</span></a>
    <a href="/admin/orders.html"><span>📋</span><span>Pesanan</span></a>
    <a href="/admin/menu.html"><span>🌯</span><span>Menu</span></a>
    <a href="/admin/reports.html"><span>📊</span><span>Laporan</span></a>
    <a href="/admin/outlets.html" class="admin-only"><span>📍</span><span>Outlet</span></a>
    <a href="/admin/settings.html" class="admin-only"><span>⚙️</span><span>Pengaturan</span></a>
  </nav>

</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../config.js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
let settings   = {}; // key → { id, value, description }
let templates  = []; // notification_templates rows

(async function init() {
  const u = await requireSuperAdmin();
  if (!u) return;
  await Promise.all([loadSettings(), loadTemplates()]);
  renderPage();
})();

async function loadSettings() {
  const { data } = await window.db
    .from('app_settings')
    .select('key, value');
  (data || []).forEach(row => { settings[row.key] = row; });
}

async function loadTemplates() {
  const { data } = await window.db
    .from('notification_templates')
    .select('*')
    .order('key');
  templates = data || [];
}

function val(key, fallback = '') {
  return settings[key]?.value ?? fallback;
}

function renderPage() {
  const pc   = document.getElementById('pageContent');
  const mode = val('verification_mode', 'manual');

  pc.innerHTML = `

    <!-- ── Verifikasi Transfer ───────────────────────────────── -->
    <div class="info-card" style="margin-bottom:12px">
      <div style="font-weight:700;font-size:14px;margin-bottom:12px">🤖 Verifikasi Bukti Transfer</div>

      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
        <label style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:2px solid var(--line);border-radius:10px;cursor:pointer" id="lblManual">
          <input type="radio" name="vMode" value="manual" style="accent-color:var(--brand);margin-top:2px"
                 ${mode === 'manual' ? 'checked' : ''} onchange="onVerifModeChange()" />
          <div>
            <div style="font-weight:600;font-size:13px">👤 Manual</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">Admin cek foto dan verifikasi sendiri</div>
          </div>
        </label>
        <label style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:2px solid var(--line);border-radius:10px;cursor:pointer" id="lblAI">
          <input type="radio" name="vMode" value="ai" style="accent-color:var(--brand);margin-top:2px"
                 ${mode === 'ai' ? 'checked' : ''} onchange="onVerifModeChange()" />
          <div>
            <div style="font-weight:600;font-size:13px">🤖 AI Otomatis</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">
              Gemini baca nominal &amp; penerima — auto-approve jika cocok.<br/>
              Perlu <b>OPENROUTER_API_KEY</b> di Supabase Secrets.
            </div>
          </div>
        </label>
      </div>

      <div id="aiNote" style="display:${mode === 'ai' ? '' : 'none'};padding:10px 12px;background:#f0fdf4;border-radius:8px;font-size:12px;color:#166534;margin-bottom:12px;line-height:1.5">
        ✅ Mode AI aktif. Setiap bukti transfer akan dianalisis otomatis.<br/>
        Confidence <b>tinggi</b> → auto-approve + WA ke customer.<br/>
        Confidence <b>rendah/medium</b> → tetap menunggu verifikasi manual.
      </div>

      <button class="btn-add-big" style="width:100%" onclick="saveVerifMode()">
        Simpan Mode Verifikasi
      </button>
    </div>

    <!-- ── Biaya Layanan ──────────────────────────────────────── -->
    <div class="info-card" style="margin-bottom:12px">
      <div style="font-weight:700;font-size:14px;margin-bottom:12px">💰 Biaya Layanan</div>

      <div class="form-group">
        <label class="form-label">Service Fee (%)</label>
        <input id="sFee" class="form-input" type="number" min="0" max="100" step="0.1"
               value="${parseFloat(val('service_fee_percent', '0.7')).toFixed(1)}"
               placeholder="0.7" />
        <div style="font-size:11px;color:var(--muted);margin-top:4px">Contoh: 0.7 = 0.7% dari subtotal</div>
      </div>

      <div class="form-group">
        <label class="form-label">Waktu Kedaluwarsa QRIS (menit)</label>
        <input id="sExpire" class="form-input" type="number" min="5" max="1440" step="5"
               value="${parseInt(val('qris_expire_minutes', '15'))}" placeholder="15" />
      </div>

      <div style="margin-top:4px">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px">
          <input id="sPassthrough" type="checkbox"
                 ${val('service_fee_passthrough', true) != false ? 'checked' : ''} />
          Biaya layanan ditanggung customer (direkomendasikan)
        </label>
      </div>

      <button class="btn-add-big" style="width:100%;margin-top:16px" onclick="saveSettings()">
        Simpan Pengaturan
      </button>
    </div>

    <!-- ── Bulk Import ──────────────────────────────────────────── -->
    <div class="info-card" style="margin-bottom:12px">
      <div style="font-weight:700;font-size:14px;margin-bottom:8px">📥 Bulk Import</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">Import data dalam jumlah besar via CSV</div>
      <a href="/admin/import.html" class="btn-outline" style="display:block;text-align:center;margin-bottom:0">
        Buka Halaman Import →
      </a>
    </div>

    <!-- ── Manajemen Pengguna ───────────────────────────────────── -->
    <div class="info-card" style="margin-bottom:12px">
      <div style="font-weight:700;font-size:14px;margin-bottom:8px">👤 Manajemen Pengguna</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">Buat dan kelola akun outlet staff</div>
      <a href="/admin/users.html" class="btn-outline" style="display:block;text-align:center;margin-bottom:0">
        Kelola Pengguna →
      </a>
    </div>

    <!-- ── Notification Templates ──────────────────────────────── -->
    <div style="font-weight:700;font-size:14px;margin-bottom:8px;margin-top:4px">
      📱 Template Notifikasi WhatsApp
    </div>
    ${templates.length === 0
      ? `<div class="hint-banner">Template belum ada. Jalankan seed SQL untuk menambahkan template default.</div>`
      : templates.map(tmplCard).join('')
    }

    <!-- ── Program Loyalty ───────────────────────────────────── -->
    <div class="info-card" style="margin-bottom:12px">
      <div style="font-weight:700;font-size:14px;margin-bottom:14px">🎁 Program Loyalty</div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--line)">
        <div>
          <div style="font-weight:600;font-size:13px">Aktifkan Program Loyalty</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Customer dapat voucher saat milestone tercapai</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="loyaltyEnabled"
            ${val('loyalty_enabled','false') === 'true' ? 'checked' : ''}
            onchange="saveLoyaltySetting('loyalty_enabled', this.checked ? 'true' : 'false')">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--line)">
        <div>
          <div style="font-weight:600;font-size:13px">Notif WA Otomatis</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Kirim WA ke customer saat dapat voucher</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="loyaltyNotifAuto"
            ${val('loyalty_notif_auto','false') === 'true' ? 'checked' : ''}
            onchange="saveLoyaltySetting('loyalty_notif_auto', this.checked ? 'true' : 'false')">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px">MILESTONE & REWARD</div>
      ${[1,2,3].map(n => loyaltyMilestoneRow(n)).join('')}
    </div>

    <div style="height:80px"></div>
  `;
}

function loyaltyMilestoneRow(n) {
  const count  = val(`loyalty_milestone_${n}`, n === 1 ? '5' : n === 2 ? '10' : '20');
  const reward = val(`loyalty_reward_${n}`, '');
  return `
    <div style="border:1px solid var(--line2);border-radius:10px;padding:12px;margin-bottom:8px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px">MILESTONE ${n}</div>
      <div style="display:flex;gap:8px">
        <div style="flex-shrink:0;width:80px">
          <label style="font-size:11px;color:var(--muted)">Order ke-</label>
          <input type="number" class="form-input" style="font-size:13px;padding:7px 8px;margin-top:3px"
            value="${count}" min="1"
            onchange="saveLoyaltySetting('loyalty_milestone_${n}', this.value)">
        </div>
        <div style="flex:1">
          <label style="font-size:11px;color:var(--muted)">Reward</label>
          <input type="text" class="form-input" style="font-size:13px;padding:7px 8px;margin-top:3px"
            value="${reward}" placeholder="Deskripsi reward..."
            onchange="saveLoyaltySetting('loyalty_reward_${n}', this.value)">
        </div>
      </div>
    </div>`;
}

async function saveLoyaltySetting(key, value) {
  const { error } = await window.db
    .from('app_settings')
    .upsert({ key, value, updated_at: new Date().toISOString() }, { onConflict: 'key' });
  if (error) { adminToast('❌ Gagal simpan'); return; }
  settings[key] = { key, value };
  adminToast('✅ Tersimpan');
}

function tmplCard(tmpl) {
  const keyLabels = {
    new_order_admin:    '🔔 Order Baru → Admin',
    new_order_outlet:   '🔔 Order Baru → Outlet',
    paid_customer:      '✅ Pembayaran Sukses → Customer',
    ready_customer:     '🎉 Pesanan Siap → Customer',
    cancelled_customer: '❌ Dibatalkan → Customer',
  };
  const label = keyLabels[tmpl.key] || tmpl.key;

  return `<div class="info-card" style="margin-bottom:10px">
    <div style="font-weight:600;font-size:13px;margin-bottom:8px">${label}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:6px">
      Variabel: {{order_number}}, {{customer_name}}, {{outlet_name}}, {{total}}, {{pickup_time}}
    </div>
    <textarea id="tmpl-${tmpl.id}" class="form-input" rows="4"
              style="font-size:12px;font-family:monospace">${tmpl.body_template || ''}</textarea>
    <button class="action-btn action-secondary" style="margin-top:8px;width:100%"
            onclick="saveTemplate('${tmpl.id}')">Simpan Template</button>
  </div>`;
}

// ─── Toggle verifikasi mode ───────────────────────────────────────────────────
function onVerifModeChange() {
  const isAI = document.querySelector('[name=vMode]:checked')?.value === 'ai';
  document.getElementById('aiNote').style.display = isAI ? '' : 'none';
  document.getElementById('lblAI').style.borderColor    = isAI ? 'var(--brand)' : 'var(--line)';
  document.getElementById('lblManual').style.borderColor = isAI ? 'var(--line)' : 'var(--brand)';
}

async function saveVerifMode() {
  const mode = document.querySelector('[name=vMode]:checked')?.value || 'manual';
  const { error } = await window.db
    .from('app_settings')
    .upsert({ key: 'verification_mode', value: mode, updated_at: new Date().toISOString() },
             { onConflict: 'key' });
  if (error) { adminToast('❌ ' + error.message); return; }
  settings['verification_mode'] = { value: mode };
  adminToast(mode === 'ai' ? '✅ Mode AI aktif' : '✅ Mode manual aktif');
}

// ─── Simpan app_settings ──────────────────────────────────────────────────────
async function saveSettings() {
  const fee        = parseFloat(document.getElementById('sFee').value);
  const expire     = parseInt(document.getElementById('sExpire').value);
  const passthrough = document.getElementById('sPassthrough').checked;

  if (isNaN(fee) || fee < 0 || fee > 100) { adminToast('❌ Service fee tidak valid (0–100%)'); return; }
  if (isNaN(expire) || expire < 5)         { adminToast('❌ Waktu minimal 5 menit'); return; }

  const upserts = [
    { key: 'service_fee_percent',    value: fee,         updated_at: new Date().toISOString() },
    { key: 'qris_expire_minutes',    value: expire,      updated_at: new Date().toISOString() },
    { key: 'service_fee_passthrough',value: passthrough, updated_at: new Date().toISOString() },
  ];

  const { error } = await window.db
    .from('app_settings')
    .upsert(upserts, { onConflict: 'key' });

  if (error) { adminToast('❌ ' + error.message); return; }
  adminToast('✅ Pengaturan disimpan');
}

// ─── Simpan satu notification template ───────────────────────────────────────
async function saveTemplate(templateId) {
  const body = document.getElementById(`tmpl-${templateId}`)?.value?.trim();
  if (!body) { adminToast('❌ Template tidak boleh kosong'); return; }

  const { error } = await window.db
    .from('notification_templates')
    .update({ body_template: body })
    .eq('id', templateId);

  if (error) { adminToast('❌ ' + error.message); return; }
  const idx = templates.findIndex(t => t.id === templateId);
  if (idx >= 0) templates[idx].body = body;
  adminToast('✅ Template disimpan');
}
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
