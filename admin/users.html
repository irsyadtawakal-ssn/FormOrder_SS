    <div class="px-6 py-4 flex flex-col gap-1 bg-brand-dark/20 border-t border-b border-brand-dark/30">
      <span class="text-sm font-bold text-white" id="sidebarName">—</span>
      <span class="text-xs font-medium text-orange-200" id="sidebarRole">—</span>
    </div>
    <nav class="flex-1 overflow-y-auto py-4 flex flex-col gap-1 px-3">
      <a href="/" target="_blank" rel="noopener" class="flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="external-link" class="w-5 h-5"></i><span>Buka Website Order</span></a>
      <a href="/admin/index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Dashboard</span></a>
      <a href="/admin/orders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="clipboard-list" class="w-5 h-5"></i><span>Pesanan</span></a>
      <a href="/admin/menu.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="utensils" class="w-5 h-5"></i><span>Menu</span></a>
      <a href="/admin/reports.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="bar-chart-2" class="w-5 h-5"></i><span>Laporan</span></a>
      <a href="/admin/customers.html" class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="users" class="w-5 h-5"></i><span>Pelanggan</span></a>
      <a href="/admin/promos.html" class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="tag" class="w-5 h-5"></i><span>Promo</span></a>
      <a href="/admin/outlets.html" class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="map-pin" class="w-5 h-5"></i><span>Outlet</span></a>
      <a href="/admin/users.html" class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors bg-white text-brand shadow-sm"><i data-lucide="user-cog" class="w-5 h-5"></i><span>Pengguna</span></a>
      <a href="/admin/monitoring.html" class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="activity" class="w-5 h-5"></i><span>Monitoring</span></a>
      <a href="/admin/settings.html" class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="settings" class="w-5 h-5"></i><span>Pengaturan</span></a>
    </nav>
    <div class="p-4 border-t border-brand-dark/30">
      <button onclick="adminSignOut()" class="flex items-center justify-center gap-2 text-white bg-brand-dark hover:bg-orange-900 py-2.5 px-4 rounded-xl w-full transition-colors font-bold shadow-sm border border-brand-dark/50">
        <i data-lucide="log-out" class="w-5 h-5"></i> Keluar
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col h-full overflow-hidden relative">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between shadow-sm z-10">
      <div class="flex items-center gap-3">
        <img src="../assets/img/logo.png" alt="SUKA" class="h-8 w-auto md:hidden" onerror="this.style.display='none'">
        <div class="hidden md:flex items-center gap-2 font-bold text-gray-800 text-lg">
          <i data-lucide="user-cog" class="w-5 h-5 text-brand"></i> Pengguna
        </div>
        <span class="md:hidden font-bold text-gray-800 flex items-center gap-2"><i data-lucide="user-cog" class="w-5 h-5 text-brand"></i> Pengguna</span>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="openUserForm(null)" class="flex items-center gap-1.5 bg-brand hover:bg-brand-dark text-white text-sm font-bold px-4 py-2 rounded-full shadow-sm transition-colors">
          <i data-lucide="plus" class="w-4 h-4"></i> Tambah
        </button>
        <button onclick="adminSignOut()" class="md:hidden flex items-center gap-1 text-xs font-bold text-red-600 bg-red-50 px-3 py-1.5 rounded-full">
          <i data-lucide="log-out" class="w-3.5 h-3.5"></i>
        </button>
      </div>
    </header>

    <!-- Scrollable Content Area -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8 bg-brand-bg/50">
      <div class="max-w-3xl mx-auto">
        <!-- Search bar -->
        <div class="mb-4 relative">
          <input type="text" id="searchUser" oninput="renderUsers()" class="w-full bg-white border border-gray-200 rounded-2xl px-10 py-3 text-sm focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand shadow-sm" placeholder="Cari nama atau email pengguna...">
          <i data-lucide="search" class="w-5 h-5 absolute left-3.5 top-3 text-gray-400"></i>
        </div>
        <div id="userList">
          <div class="skeleton-card"><div class="skeleton-lines">
            <div class="skeleton skeleton-line"></div>
            <div class="skeleton skeleton-line short"></div>
          </div></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex items-center justify-around pb-safe pt-1 z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
    <a href="/admin/index.html" class="flex flex-col items-center gap-1 py-2 px-2 text-gray-500 hover:text-brand"><i data-lucide="layout-dashboard" class="w-5 h-5"></i><span class="text-[10px] font-medium">Dashboard</span></a>
    <a href="/admin/orders.html" class="flex flex-col items-center gap-1 py-2 px-2 text-gray-500 hover:text-brand"><i data-lucide="clipboard-list" class="w-5 h-5"></i><span class="text-[10px] font-medium">Pesanan</span></a>
    <a href="/admin/menu.html" class="flex flex-col items-center gap-1 py-2 px-2 text-gray-500 hover:text-brand"><i data-lucide="utensils" class="w-5 h-5"></i><span class="text-[10px] font-medium">Menu</span></a>
    <a href="/admin/reports.html" class="flex flex-col items-center gap-1 py-2 px-2 text-gray-500 hover:text-brand"><i data-lucide="bar-chart-2" class="w-5 h-5"></i><span class="text-[10px] font-medium">Laporan</span></a>
    <a href="/admin/settings.html" class="admin-only flex flex-col items-center gap-1 py-2 px-2 text-gray-500 hover:text-brand"><i data-lucide="settings" class="w-5 h-5"></i><span class="text-[10px] font-medium">Settings</span></a>
  </nav>
</div>
<div class="toast" id="toast"></div>
<div id="adminModal" class="admin-modal-overlay" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../config.js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/admin.js?v=2"></script>
<script>
let allUsers   = [];
let allOutlets = [];

(async function init() {
  const u = await requireSuperAdmin();
  if (!u) return;
  await Promise.all([loadUsers(), loadOutlets()]);
})();

async function loadUsers() {
  const { data } = await window.db
    .from('admin_users')
    .select('id, email, full_name, role, outlet_id, is_active')
    .order('full_name');
  allUsers = data || [];
  renderUsers();
}

async function loadOutlets() {
  const { data } = await window.db
    .from('outlets').select('id, name').eq('is_active', true).order('name');
  allOutlets = data || [];
}

function outletName(outletId) {
  if (!outletId) return '—';
  return (allOutlets.find(o => o.id === outletId) || {}).name || '—';
}

function renderUsers() {
  const el = document.getElementById('userList');
  const q = (document.getElementById('searchUser')?.value || '').toLowerCase();
  
  const filteredUsers = allUsers.filter(u => 
    (u.full_name || '').toLowerCase().includes(q) || 
    (u.email || '').toLowerCase().includes(q)
  );

  if (filteredUsers.length === 0) {
    el.innerHTML = `<div class="empty"><i data-lucide="user-x" class="w-10 h-10 mx-auto mb-3 text-gray-300"></i><div class="empty-title">Tidak ada pengguna ditemukan</div></div>`;
    if (window.lucide) window.lucide.createIcons();
    return;
  }
  el.innerHTML = filteredUsers.map(userRow).join('') + '<div style="height:80px"></div>';
  if (window.lucide) window.lucide.createIcons();
}

function userRow(u) {
  const roleIcon  = u.role === 'super_admin' ? 'shield' : 'store';
  const roleLabel = u.role === 'super_admin' ? 'Super Admin' : 'Staff Outlet';
  const roleColor = u.role === 'super_admin' ? 'var(--ui-brand)' : '#2563eb';

  return `<div class="admin-order-row" style="opacity:${u.is_active ? 1 : 0.55}">
    <div style="display:flex;gap:12px;align-items:flex-start">
      <div style="width:40px;height:40px;border-radius:50%;background:var(--ui-line);
                  display:flex;align-items:center;justify-content:center;color:var(--ui-muted);flex-shrink:0">
        <i data-lucide="user" class="w-5 h-5"></i>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:14px">${escHtml(u.full_name)}</div>
        <div style="font-size:12px;color:var(--ui-muted)">${escHtml(u.email)}</div>
        <div style="margin-top:4px;display:flex;align-items:center;gap:6px">
          <span style="font-size:11px;color:${roleColor};font-weight:700;display:inline-flex;align-items:center;gap:3px"><i data-lucide="${roleIcon}" class="w-3 h-3"></i> ${roleLabel}</span>
          ${u.role === 'outlet_staff' ? `<span style="font-size:11px;color:var(--ui-muted)">· ${escHtml(outletName(u.outlet_id))}</span>` : ''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0">
        <label class="toggle-wrap" title="${u.is_active ? 'Aktif' : 'Nonaktif'}">
          <input type="checkbox" ${u.is_active ? 'checked' : ''}
                 onchange="toggleUser('${u.id}',this.checked)" />
          <span class="toggle-slider"></span>
        </label>
        <button class="action-btn action-secondary"
                style="font-size:11px;padding:5px 12px"
                onclick="openEditUser('${u.id}')">Edit</button>
        <button class="action-btn"
                style="font-size:11px;padding:5px 12px;background:#fee2e2;color:#dc2626;border-color:#fecaca"
                onclick="deleteUser('${u.id}', '${escHtml(u.full_name)}')">Hapus</button>
      </div>
    </div>
  </div>`;
}

// ─── Toggle aktif ─────────────────────────────────────────────────────────────
async function toggleUser(userId, active) {
  const { error } = await window.db
    .from('admin_users').update({ is_active: active }).eq('id', userId);
  if (error) { adminToast('❌ ' + error.message); return; }
  const idx = allUsers.findIndex(u => u.id === userId);
  if (idx >= 0) allUsers[idx].is_active = active;
  adminToast(active ? '✅ Akun diaktifkan' : '⏸ Akun dinonaktifkan');
  renderUsers();
}

async function deleteUser(userId, name) {
  if (adminUser && adminUser.id === userId) {
    adminToast('❌ Tidak bisa menghapus akun sendiri');
    return;
  }
  if (!confirm(`Apakah Anda yakin ingin menghapus permanen pengguna "${name}"?`)) return;
  
  const { error } = await window.db.from('admin_users').delete().eq('id', userId);
  if (error) { adminToast('❌ ' + error.message); return; }
  
  adminToast('✅ Pengguna berhasil dihapus');
  await loadUsers();
}

// ─── Form tambah user baru ────────────────────────────────────────────────────
function openUserForm(dummy) {
  const outletOpts = allOutlets.map(o =>
    `<option value="${o.id}">${o.name}</option>`
  ).join('');

  openModal('+ Tambah Pengguna', `
    <div class="form-group">
      <label class="form-label">Nama Lengkap</label>
      <input id="uName" class="form-input" placeholder="Budi Santoso" />
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="uEmail" class="form-input" type="email" placeholder="budi@sukshawarma.com" autocomplete="off" />
    </div>
    <div class="form-group">
      <label class="form-label">Password (min 8 karakter)</label>
      <input id="uPass" class="form-input" type="password" placeholder="••••••••" autocomplete="new-password" />
    </div>
    <div class="form-group">
      <label class="form-label">Role</label>
      <select id="uRole" class="form-input" onchange="toggleOutletField()">
        <option value="outlet_staff">Staff Outlet</option>
        <option value="super_admin">Super Admin</option>
      </select>
    </div>
    <div class="form-group" id="outletFieldWrap">
      <label class="form-label">Outlet</label>
      <select id="uOutlet" class="form-input">
        <option value="">— Pilih outlet —</option>
        ${outletOpts}
      </select>
    </div>
  `,
  `<button class="btn-add-big" style="width:100%" onclick="createUser()">Buat Akun</button>`);
}

function toggleOutletField() {
  const role = document.getElementById('uRole').value;
  document.getElementById('outletFieldWrap').style.display =
    role === 'outlet_staff' ? '' : 'none';
}

async function createUser() {
  const name     = document.getElementById('uName').value.trim();
  const email    = document.getElementById('uEmail').value.trim();
  const password = document.getElementById('uPass').value;
  const role     = document.getElementById('uRole').value;
  const outletId = document.getElementById('uOutlet')?.value || null;

  if (!name || !email || !password) { adminToast('❌ Semua field wajib diisi'); return; }
  if (role === 'outlet_staff' && !outletId) { adminToast('❌ Pilih outlet untuk staff'); return; }
  if (password.length < 8) { adminToast('❌ Password minimal 8 karakter'); return; }

  const btn = document.querySelector('#adminModal .btn-add-big');
  if (btn) { btn.disabled = true; btn.textContent = 'Membuat akun…'; }

  try {
    const { data, error } = await window.db.functions.invoke('create-admin-user', {
      body: { email, password, full_name: name, role, outlet_id: outletId || null },
    });

    if (error || (data && !data.success)) {
      throw new Error((data && data.error) || (error && error.message) || 'Gagal membuat akun');
    }

    adminToast('✅ Akun berhasil dibuat');
    closeModal();
    await loadUsers();
  } catch (e) {
    adminToast('❌ ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = 'Buat Akun'; }
  }
}

// ─── Edit user (hanya full_name, outlet_id, is_active — tidak reset password) ─
function openEditUser(userId) {
  const u = allUsers.find(x => x.id === userId);
  if (!u) return;

  const outletOpts = allOutlets.map(o =>
    `<option value="${o.id}" ${u.outlet_id === o.id ? 'selected' : ''}>${o.name}</option>`
  ).join('');

  openModal('Edit Pengguna', `
    <div class="form-group">
      <label class="form-label">Nama Lengkap</label>
      <input id="euName" class="form-input" value="${escHtml(u.full_name)}" />
    </div>
    <div style="padding:8px 0;font-size:13px;color:var(--ui-muted)">
      Email: <b>${escHtml(u.email)}</b> (tidak bisa diubah)
    </div>
    <div style="padding:4px 0;font-size:13px;color:var(--ui-muted)">
      Role: <b>${u.role === 'super_admin' ? 'Super Admin' : 'Staff Outlet'}</b> (tidak bisa diubah)
    </div>
    ${u.role === 'outlet_staff' ? `
    <div class="form-group" style="margin-top:10px">
      <label class="form-label">Outlet</label>
      <select id="euOutlet" class="form-input">
        <option value="">— Pilih outlet —</option>
        ${outletOpts}
      </select>
    </div>` : ''}
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-top:10px">
      <input id="euActive" type="checkbox" ${u.is_active ? 'checked' : ''} /> Akun aktif
    </label>
  `,
  `<button class="btn-add-big" style="width:100%" onclick="saveEditUser('${u.id}','${u.role}')">Simpan</button>`);
}

async function saveEditUser(userId, role) {
  const name   = document.getElementById('euName').value.trim();
  const active = document.getElementById('euActive').checked;
  const outlet = role === 'outlet_staff' ? (document.getElementById('euOutlet')?.value || null) : null;

  if (!name) { adminToast('❌ Nama wajib diisi'); return; }

  const patch = { full_name: name, is_active: active };
  if (role === 'outlet_staff') patch.outlet_id = outlet;

  const { error } = await window.db.from('admin_users').update(patch).eq('id', userId);
  if (error) { adminToast('❌ ' + error.message); return; }

  const idx = allUsers.findIndex(u => u.id === userId);
  if (idx >= 0) allUsers[idx] = { ...allUsers[idx], ...patch };

  adminToast('✅ Pengguna diperbarui');
  closeModal();
  renderUsers();
}
</script>
<script>
  // Render icon shell statis (Lucide tidak auto-run di UMD)
  (function(){ var f=function(){ if(window.lucide) window.lucide.createIcons(); };
    document.addEventListener('DOMContentLoaded', f); window.addEventListener('load', f); })();
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
