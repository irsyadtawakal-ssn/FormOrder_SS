<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Login Admin — SUKA Shawarma</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#f29744" />
<script src="https://unpkg.com/@tailwindcss/browser@4"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="../assets/css/admin-ui.css?v=2" />
<style type="text/tailwindcss">
  @theme {
    --color-brand: #f29744;
    --color-brand-bg: #fff7ed;
    --color-brand-dark: #ee8a2c;
  }
  @utility form-group {
    @apply flex flex-col gap-1.5 mb-4;
  }
  @utility form-label {
    @apply text-xs font-bold text-gray-600 uppercase tracking-wide;
  }
  @utility form-input {
    @apply w-full bg-white border border-gray-200 text-gray-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand transition-all placeholder:text-gray-300;
  }
  @utility btn-add-big {
    @apply w-full bg-brand hover:bg-brand-dark text-white font-bold py-3 rounded-xl transition-all shadow-md shadow-brand/10 text-center cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed;
  }
</style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
<div class="flex min-h-screen flex-col items-center justify-center p-4">
  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-sm border border-gray-100 flex flex-col">

    <div class="text-center mb-8">
      <div class="mb-4">
        <img src="../assets/img/logo.png" alt="SUKA Shawarma" class="h-20 w-auto mx-auto" onerror="this.outerHTML='<i data-lucide=\'utensils\' class=\'w-16 h-16 text-brand mx-auto\'></i>'; if(window.lucide) window.lucide.createIcons();">
      </div>
      <div class="text-2xl font-black text-brand tracking-tight">SUKA Shawarma</div>
      <div class="text-sm font-semibold text-gray-400 mt-1">Panel Admin</div>
    </div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-input" placeholder="admin@sukshawarma.com"
             autocomplete="email" />
    </div>
    <div class="form-group mt-2">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••"
             autocomplete="current-password" />
    </div>

    <div id="loginError" style="color:var(--brand);font-size:13px;margin-top:8px;display:none" class="text-sm text-red-600 bg-red-50 border border-red-100 px-4 py-3 rounded-xl"></div>

    <button id="btnLogin" class="btn-add-big mt-4" onclick="doLogin()">
      Masuk
    </button>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../config.js"></script>
<script src="../assets/js/supabase.js"></script>
<script>
// Redirect kalau sudah login
(async function () {
  if (window.lucide) window.lucide.createIcons();
  const { data: { user } } = await window.db.auth.getUser();
  if (user) {
    const { data: p } = await window.db.from('admin_users').select('id').eq('id', user.id).single();
    if (p) { window.location.replace('index.html'); }
  }
})();

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('loginError');
  const btn      = document.getElementById('btnLogin');

  errEl.style.display = 'none';
  if (!email || !password) {
    errEl.textContent = 'Email dan password wajib diisi.';
    errEl.style.display = '';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Memproses…';

  const { data, error } = await window.db.auth.signInWithPassword({ email, password });

  if (error) {
    errEl.textContent = 'Email atau password salah.';
    errEl.style.display = '';
    btn.disabled = false;
    btn.textContent = 'Masuk';
    return;
  }

  // Verifikasi user ada di admin_users dan aktif
  const { data: profile, error: pe } = await window.db
    .from('admin_users')
    .select('id, role, is_active')
    .eq('id', data.user.id)
    .single();

  if (pe || !profile || !profile.is_active) {
    await window.db.auth.signOut();
    errEl.textContent = 'Akun tidak memiliki akses admin atau sudah dinonaktifkan.';
    errEl.style.display = '';
    btn.disabled = false;
    btn.textContent = 'Masuk';
    return;
  }

  window.location.replace('index.html');
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
