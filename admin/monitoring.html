<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Monitoring Sistem — SUKA Admin</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#f29744" />
<script src="https://unpkg.com/@tailwindcss/browser@4"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="../assets/css/admin-ui.css?v=2" />
<style type="text/tailwindcss">
  @theme {
    --color-brand: #f29744;
    --color-brand-bg: #fff7ed;
    --color-brand-dark: #ee8a2c;
  }
</style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="hidden md:flex flex-col w-64 bg-brand h-full shadow-lg z-20 relative">
    <div class="p-6 flex items-center gap-3">
      <i data-lucide="utensils" class="text-white w-6 h-6"></i>
      <span class="font-extrabold text-xl text-white">SUKA Admin</span>
    </div>
    <div class="px-6 py-4 flex flex-col gap-1 bg-brand-dark/20 border-t border-b border-brand-dark/30">
      <span class="text-sm font-bold text-white" id="sidebarName">—</span>
      <span class="text-xs font-medium text-orange-200" id="sidebarRole">—</span>
    </div>
    <nav class="flex-1 overflow-y-auto py-4 flex flex-col gap-1 px-3">
      <a href="/admin/index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Dashboard</span></a>
      <a href="/admin/orders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="clipboard-list" class="w-5 h-5"></i><span>Pesanan</span></a>
      <a href="/admin/menu.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="utensils" class="w-5 h-5"></i><span>Menu</span></a>
      <a href="/admin/reports.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="bar-chart-2" class="w-5 h-5"></i><span>Laporan</span></a>
      <a href="/admin/customers.html" class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="users" class="w-5 h-5"></i><span>Pelanggan</span></a>
      <a href="/admin/promos.html" class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="tag" class="w-5 h-5"></i><span>Promo</span></a>
      <a href="/admin/outlets.html" class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="map-pin" class="w-5 h-5"></i><span>Outlet</span></a>
      <a href="/admin/users.html" class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="user-cog" class="w-5 h-5"></i><span>Pengguna</span></a>
      <a href="/admin/monitoring.html" class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors bg-white text-brand shadow-sm"><i data-lucide="activity" class="w-5 h-5"></i><span>Monitoring</span></a>
      <a href="/admin/settings.html" class="admin-only flex items-center gap-3 px-3 py-2.5 rounded-xl font-semibold transition-colors text-white hover:bg-brand-dark"><i data-lucide="settings" class="w-5 h-5"></i><span>Pengaturan</span></a>
    </nav>
    <div class="p-4 border-t border-brand-dark/30">
      <button onclick="adminSignOut()" class="flex items-center justify-center gap-2 text-white bg-brand-dark hover:bg-orange-900 py-2.5 px-4 rounded-xl w-full transition-colors font-bold shadow-sm border border-brand-dark/50">
        <i data-lucide="log-out" class="w-5 h-5"></i> Keluar
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col h-full overflow-hidden relative">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between shadow-sm z-10">
      <div class="flex items-center gap-3">
        <img src="../assets/img/logo.png" alt="SUKA" class="h-8 w-auto md:hidden" onerror="this.style.display='none'">
        <div class="hidden md:flex items-center gap-2 font-bold text-gray-800 text-lg">
          <i data-lucide="activity" class="w-5 h-5 text-brand"></i> Monitoring
        </div>
        <div class="md:hidden flex flex-col">
          <span class="text-xs font-bold text-gray-800"><span id="adminRole"></span> <span id="adminName"></span></span>
        </div>
      </div>
      <button onclick="adminSignOut()" class="flex items-center gap-1 text-xs font-bold text-red-600 bg-red-50 px-3 py-1.5 rounded-full">
        <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Keluar
      </button>
    </header>

    <!-- Scrollable Content Area -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8 bg-brand-bg/50">
      <div class="max-w-5xl mx-auto">
        <div id="pageContent">
          <!-- Skeleton awal -->
          <div class="stat-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
            <div class="stat-card"><div class="skeleton skeleton-line" style="height:18px;margin-bottom:8px"></div><div class="skeleton skeleton-line short"></div></div>
            <div class="stat-card"><div class="skeleton skeleton-line" style="height:18px;margin-bottom:8px"></div><div class="skeleton skeleton-line short"></div></div>
          </div>

          <div id="monContent" style="display:none">
            <div id="statusBar" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px"></div>
            <div id="metricCards" class="stat-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px"></div>

            <div class="bg-white border border-gray-200 rounded-2xl p-4 md:p-5 shadow-sm mb-4">
              <div class="flex items-center gap-2 text-sm font-bold text-gray-700 mb-3"><i data-lucide="alert-triangle" class="w-4 h-4 text-amber-500"></i> Butuh Perhatian</div>
              <div id="attentionPanel"></div>
            </div>
            <div class="bg-white border border-gray-200 rounded-2xl p-4 md:p-5 shadow-sm mb-4">
              <div class="flex items-center gap-2 text-sm font-bold text-gray-700 mb-3"><i data-lucide="trending-up" class="w-4 h-4 text-brand"></i> Volume Order per Jam</div>
              <div id="volumeChart" style="display:flex;align-items:flex-end;gap:3px;height:70px;padding:4px 0"></div>
            </div>
            <div class="bg-white border border-gray-200 rounded-2xl p-4 md:p-5 shadow-sm mb-4">
              <div class="flex items-center gap-2 text-sm font-bold text-gray-700 mb-3"><i data-lucide="timer" class="w-4 h-4 text-brand"></i> Heartbeat Cron</div>
              <div id="cronPanel"></div>
            </div>
            <div class="bg-white border border-gray-200 rounded-2xl p-4 md:p-5 shadow-sm mb-4 admin-only">
              <div class="flex items-center gap-2 text-sm font-bold text-gray-700 mb-3"><i data-lucide="hard-drive" class="w-4 h-4 text-brand"></i> Kapasitas</div>
              <div id="capacityPanel"></div>
            </div>
            <div class="bg-white border border-gray-200 rounded-2xl p-4 md:p-5 shadow-sm mb-4">
              <div class="flex items-center gap-2 text-sm font-bold text-gray-700 mb-3"><i data-lucide="bell" class="w-4 h-4 text-brand"></i> Log Alert</div>
              <div id="alertLog"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex items-center justify-around pb-safe pt-1 z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
    <a href="/admin/index.html" class="flex flex-col items-center gap-1 py-2 px-2 text-gray-500 hover:text-brand"><i data-lucide="layout-dashboard" class="w-5 h-5"></i><span class="text-[10px] font-medium">Dashboard</span></a>
    <a href="/admin/orders.html" class="flex flex-col items-center gap-1 py-2 px-2 text-gray-500 hover:text-brand"><i data-lucide="clipboard-list" class="w-5 h-5"></i><span class="text-[10px] font-medium">Pesanan</span></a>
    <a href="/admin/menu.html" class="flex flex-col items-center gap-1 py-2 px-2 text-gray-500 hover:text-brand"><i data-lucide="utensils" class="w-5 h-5"></i><span class="text-[10px] font-medium">Menu</span></a>
    <a href="/admin/reports.html" class="flex flex-col items-center gap-1 py-2 px-2 text-gray-500 hover:text-brand"><i data-lucide="bar-chart-2" class="w-5 h-5"></i><span class="text-[10px] font-medium">Laporan</span></a>
    <a href="/admin/monitoring.html" class="admin-only flex flex-col items-center gap-1 py-2 px-2 text-brand"><i data-lucide="activity" class="w-5 h-5"></i><span class="text-[10px] font-bold">Monitor</span></a>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../config.js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/admin.js?v=2"></script>
<script src="../assets/js/monitoring.js"></script>
<script>
  // Render icon shell statis (Lucide tidak auto-run di UMD)
  (function(){ var f=function(){ if(window.lucide) window.lucide.createIcons(); };
    document.addEventListener('DOMContentLoaded', f); window.addEventListener('load', f); })();
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
