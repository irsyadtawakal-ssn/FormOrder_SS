  <!-- Main Content -->
  <div class="flex-1 flex flex-col h-full overflow-hidden relative">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between shadow-sm z-10">

        <div class="hidden md:flex items-center gap-2 font-bold text-gray-800 text-lg">
          <i data-lucide="ticket" class="w-5 h-5 text-brand"></i> Voucher
        </div>
        <span class="md:hidden font-bold text-gray-800 flex items-center gap-2"><i data-lucide="ticket" class="w-5 h-5 text-brand"></i> Voucher</span>
      </div>
      <div class="flex items-center gap-2">
        <span id="adminName" class="hidden md:block text-xs text-gray-500"></span>
        <button onclick="adminSignOut()" class="md:hidden flex items-center gap-1 text-xs font-bold text-red-600 bg-red-50 px-3 py-1.5 rounded-full">
          <i data-lucide="log-out" class="w-3.5 h-3.5"></i>
        </button>
      </div>
    </header>

    <!-- Scrollable Content Area -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8 bg-gray-50">
      <div class="admin-content max-w-5xl mx-auto">

        <!-- Search + filter -->
        <div class="search-wrap" style="margin-bottom:8px">
          <input type="search" id="searchInput" placeholder="Cari kode / WA / nama…" oninput="renderTable()" />
        </div>

        <!-- Status chips -->
        <div class="chips" style="padding-bottom:8px">
          <button class="chip active" data-filter="all"    onclick="setFilter('all')">Semua</button>
          <button class="chip"        data-filter="active" onclick="setFilter('active')">Aktif</button>
          <button class="chip"        data-filter="used"   onclick="setFilter('used')">Dipakai</button>
        </div>

        <!-- Summary bar -->
        <div id="summaryBar" style="padding:4px 0 8px;font-size:12px;color:var(--muted)">—</div>

        <!-- Table -->
        <div class="report-table-wrap" style="overflow-x:auto">
          <table class="report-table" id="voucherTable">
            <thead>
              <tr>
                <th style="text-align:left">Kode</th>
                <th style="text-align:left">Pelanggan</th>
                <th style="text-align:center">Milestone</th>
                <th style="text-align:center">Status</th>
              </tr>
            </thead>
            <tbody id="voucherBody">
              <tr><td colspan="4" class="report-empty">Memuat…</td></tr>
            </tbody>
          </table>
        </div>

      </div>

  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex items-center justify-around pb-safe pt-1 z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">

    <a href="/admin/reports.html" class="flex flex-col items-center gap-1 py-2 px-2 text-gray-500 hover:text-brand"><i data-lucide="bar-chart-2" class="w-5 h-5"></i><span class="text-[10px] font-medium">Laporan</span></a>
    <a href="/admin/settings.html" class="admin-only flex flex-col items-center gap-1 py-2 px-2 text-gray-500 hover:text-brand"><i data-lucide="settings" class="w-5 h-5"></i><span class="text-[10px] font-medium">Settings</span></a>
  </nav>
</div>
<div class="toast" id="toast"></div>
<div id="adminModal" class="admin-modal-overlay" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../config.js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/admin.js?v=2"></script>
<script>
// ─── State ────────────────────────────────────────────────────────────────────
let allVouchers   = [];
let currentFilter = 'all';
let currentRole   = '';

// ─── Init ─────────────────────────────────────────────────────────────────────
(async function init() {
  const u = await requireAuth();
  if (!u) return;
  currentRole = u.role;
  // Hanya super_admin yang bisa akses
  if (u.role !== 'super_admin') {
    document.querySelector('.admin-content').innerHTML =
      '<p style="padding:32px;text-align:center;color:var(--muted)">Akses terbatas untuk Super Admin.</p>';
    return;
  }
  await loadVouchers();
})();

// ─── Load data ────────────────────────────────────────────────────────────────
async function loadVouchers() {
  const { data, error } = await window.db
    .from('vouchers')
    .select('*, customers(name)')
    .order('created_at', { ascending: false });

  if (error) {
    showToast('Gagal memuat data voucher');
    return;
  }
  allVouchers = data || [];
  updateSummary();
  renderTable();
}

// ─── Summary bar ──────────────────────────────────────────────────────────────
function updateSummary() {
  const total  = allVouchers.length;
  const active = allVouchers.filter(v => !v.is_used).length;
  const used   = allVouchers.filter(v =>  v.is_used).length;
  document.getElementById('summaryBar').textContent =
    `${total} voucher · ${active} aktif · ${used} dipakai`;
}

// ─── Filter ───────────────────────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.chips .chip').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderTable();
}

// ─── Escape HTML ──────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Render table ─────────────────────────────────────────────────────────────
function renderTable() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let rows = allVouchers.filter(v => {
    const matchQ =
      (v.code || '').toLowerCase().includes(q) ||
      (v.customer_wa || '').includes(q) ||
      ((v.customers?.name) || '').toLowerCase().includes(q);
    if (!matchQ) return false;
    if (currentFilter === 'active') return !v.is_used;
    if (currentFilter === 'used')   return  v.is_used;
    return true;
  });

  const tbody = document.getElementById('voucherBody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="report-empty">Tidak ada voucher ditemukan.</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(v => {
    const statusBadge = v.is_used
      ? '<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:#f3f4f6;color:var(--muted)">Dipakai</span>'
      : '<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:#dcfce7;color:#16a34a">Aktif</span>';
    const customerName = v.customers?.name || '—';
    return `
      <tr style="cursor:pointer" onclick="showVoucherDetail('${v.id}')">
        <td>
          <div style="font-weight:700;font-family:monospace;letter-spacing:1px;font-size:14px">${v.code}</div>
          <div style="font-size:11px;color:var(--muted)">${escHtml(v.reward_desc)}</div>
        </td>
        <td>
          <div style="font-size:13px">${escHtml(customerName)}</div>
          <div style="font-size:11px;color:var(--muted)">${v.customer_wa}</div>
        </td>
        <td style="text-align:center;font-weight:600">${v.milestone}×</td>
        <td style="text-align:center">${statusBadge}</td>
      </tr>`;
  }).join('');
}

// ─── Detail modal ─────────────────────────────────────────────────────────────
async function showVoucherDetail(voucherId) {
  const v = allVouchers.find(x => x.id === voucherId);
  if (!v) return;

  const created = v.created_at
    ? new Date(v.created_at).toLocaleString('id-ID', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })
    : '—';
  const usedAt = v.used_at
    ? new Date(v.used_at).toLocaleString('id-ID', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })
    : '—';

  const statusBadge = v.is_used
    ? '<span style="padding:4px 12px;border-radius:20px;background:#f3f4f6;color:var(--muted);font-size:12px">Sudah Dipakai</span>'
    : '<span style="padding:4px 12px;border-radius:20px;background:#dcfce7;color:#16a34a;font-size:12px;font-weight:600">Aktif</span>';

  const markUsedBtn = !v.is_used ? `
    <button class="btn btn-primary" style="width:100%;margin-top:16px"
            onclick="markVoucherUsed('${v.id}')"><i data-lucide="check-circle" class="w-4 h-4"></i> Tandai Sudah Dipakai</button>` : '';

  openModal('Detail Voucher', `
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:28px;font-weight:800;font-family:monospace;letter-spacing:3px;color:var(--brand)">${v.code}</div>
        <div style="margin-top:8px">${statusBadge}</div>
      </div>
      <div class="info-group">
        <div class="info-row">
          <span class="label">Reward</span>
          <span class="val">${escHtml(v.reward_desc)}</span>
        </div>
        <div class="info-row">
          <span class="label">Milestone</span>
          <span class="val">${v.milestone}× order</span>
        </div>
        <div class="info-row">
          <span class="label">Pelanggan</span>
          <span class="val">${escHtml(v.customers?.name || '—')}</span>
        </div>
        <div class="info-row">
          <span class="label">No. WA</span>
          <span class="val">${v.customer_wa}</span>
        </div>
        <div class="info-row">
          <span class="label">Dibuat</span>
          <span class="val">${created}</span>
        </div>
        ${v.is_used ? `<div class="info-row">
          <span class="label">Dipakai Pada</span>
          <span class="val">${usedAt}</span>
        </div>` : ''}
      </div>
      ${markUsedBtn}
  `);
  if (window.lucide) window.lucide.createIcons();
}

// ─── Tandai voucher dipakai ───────────────────────────────────────────────────
async function markVoucherUsed(voucherId) {
  const { error } = await window.db
    .from('vouchers')
    .update({ is_used: true, used_at: new Date().toISOString() })
    .eq('id', voucherId);

  if (error) { showToast('Gagal update voucher'); return; }

  showToast('✅ Voucher ditandai sudah dipakai');
  closeModal();
  await loadVouchers();
}
</script>
<script>
  // Render icon shell statis (Lucide tidak auto-run di UMD)
  (function(){ var f=function(){ if(window.lucide) window.lucide.createIcons(); };
    document.addEventListener('DOMContentLoaded', f); window.addEventListener('load', f); })();
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
