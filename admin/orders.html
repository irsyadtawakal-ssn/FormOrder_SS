<script>
// ─── State ────────────────────────────────────────────────────────────────────
let allOrders     = [];
let currentFilter = 'active';
let currentRole   = '';

const ACTIVE_STATUSES = ['pending_payment', 'paid', 'preparing', 'ready'];

// ─── Init ─────────────────────────────────────────────────────────────────────
(async function init() {
  console.log('[Orders] init start');
  try {
    console.log('[Orders] calling requireAuth...');
    const u = await requireAuth();
    console.log('[Orders] requireAuth returned:', u ? u.full_name : null);
    if (!u) {
      console.warn('[Orders] requireAuth returned null — redirecting');
      return;
    }

    currentRole = u.role;
    document.getElementById('liveIndicator').style.display = '';

    if (u.role === 'super_admin') {
      console.log('[Orders] loading outlets for super_admin filter...');
      const { data, error: outletErr } = await window.db
        .from('outlets').select('id, name').eq('is_active', true).order('name');
      if (outletErr) console.warn('[Orders] outlet filter error:', outletErr);
      const sel = document.getElementById('outletFilter');
      (data || []).forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.id; opt.textContent = o.name;
        sel.appendChild(opt);
      });
      document.getElementById('outletFilterWrap').style.display = '';
    }

    console.log('[Orders] calling loadOrders...');
    await loadOrders();
    console.log('[Orders] loadOrders complete, subscribing...');
    subscribeOrders(u);
  } catch (e) {
    console.error("[Orders] FATAL:", e);
    const el = document.getElementById('orderList');
    if (el) el.innerHTML = `<div class="col-span-full bg-red-50 text-red-600 p-6 rounded-xl border border-red-200 shadow-sm text-center font-medium mt-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 mx-auto mb-2 opacity-80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
      Gagal memuat pesanan: ${e.message}<br><small class="text-red-400">Buka Console (F12) untuk detail error</small>
    </div>`;
  }
})();

// ─── Load orders ──────────────────────────────────────────────────────────────
async function loadOrders() {
  console.log('[Orders] loadOrders start');
  let q = window.db
    .from('orders')
    .select(`id, order_number, customer_name, customer_wa, total, status,
             created_at, pickup_time, notes, outlet_id,
             outlets(name),
             order_items(item_name, quantity, unit_price, selections, note)`)
    .order('created_at', { ascending: false })
    .limit(200);

  if (adminUser && adminUser.role === 'outlet_staff' && adminUser.outlet_id) {
    // outlet_staff hanya lihat order outlet sendiri
    q = q.eq('outlet_id', adminUser.outlet_id);
  } else {
    // super_admin bisa filter per outlet via dropdown
    const outletId = document.getElementById('outletFilter')?.value || null;
    if (outletId) q = q.eq('outlet_id', outletId);
  }

  const { data, error } = await q;
  console.log('[Orders] query result:', error ? error : `${(data||[]).length} rows`);
  if (error) throw new Error('Query orders gagal: ' + error.message);
  
  allOrders = data || [];
  renderOrders();
}

// ─── Filter ───────────────────────────────────────────────────────────────────
function setFilter(status) {
  currentFilter = status;
  document.querySelectorAll('#filterChips button').forEach(c => {
    if (c.dataset.status === status) {
      c.className = 'shrink-0 px-4 py-2 rounded-full text-sm font-bold transition-colors bg-brand text-white';
    } else {
      c.className = 'shrink-0 px-4 py-2 rounded-full text-sm font-semibold transition-colors bg-white text-gray-600 border border-gray-200 hover:bg-gray-50';
    }
  });
  renderOrders();
}

function getFiltered() {
  if (currentFilter === 'active') return allOrders.filter(o => ACTIVE_STATUSES.includes(o.status));
  if (currentFilter === 'all')    return allOrders;
  return allOrders.filter(o => o.status === currentFilter);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderOrders() {
  const list = getFiltered();
  const el   = document.getElementById('orderList');

  if (list.length === 0) {
    el.innerHTML = `
      <div class="col-span-full bg-white rounded-xl p-8 text-center border border-gray-100 shadow-sm mt-4">
        <i data-lucide="inbox" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>
        <div class="text-gray-500 font-medium">Tidak ada pesanan</div>
        <div class="text-xs text-gray-400 mt-1">untuk filter ini</div>
      </div>
    `;
    if(window.lucide) window.lucide.createIcons();
    return;
  }
  el.innerHTML = list.map(orderCard).join('') + '<div class="h-20 col-span-full"></div>';
  if(window.lucide) window.lucide.createIcons();
}

function orderCard(o) {
  var items = o.order_items || [];
  var summary = items.slice(0, 2).map(function(i) { return i.quantity + '× ' + escHtml(i.item_name); }).join(', ');
  if (items.length > 2) summary += ' +' + (items.length - 2) + ' lagi';
  var outletName = escHtml((o.outlets || {}).name || '—');
  var action = STATUS_NEXT_ACTION[o.status];

  var h = '<div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm hover:shadow-md transition-all flex flex-col h-full" id="ord-' + o.id + '">';
  h += '<div class="flex justify-between items-start mb-3">';
  h += '  <div>';
  h += '    <span class="inline-block bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-xs font-mono mb-1">' + escHtml(o.order_number) + '</span>';
  h += '    <div class="font-bold text-gray-800 text-sm">' + escHtml(o.customer_name) + '</div>';
  h += '    <div class="text-xs text-gray-500 mt-1 flex items-center gap-1">';
  h += '      <i data-lucide="store" class="w-3 h-3"></i> ' + outletName;
  h += '      <span class="mx-1">•</span>';
  h += '      <i data-lucide="clock" class="w-3 h-3"></i> ' + fmtTimeAgo(o.created_at);
  h += '    </div>';
  h += '  </div>';
  h += '  <div class="text-right flex flex-col items-end shrink-0 ml-2">';
  h += '    ' + statusBadge(o.status);
  h += '    <div class="font-bold text-brand text-sm mt-2">' + formatRupiah(o.total) + '</div>';
  h += '  </div>';
  h += '</div>';

  if (summary) {
    h += '<div class="text-sm text-gray-600 bg-gray-50 rounded-lg p-2 mb-3 border border-gray-100">' + summary + '</div>';
  }

  h += '<div class="flex flex-col gap-2 mb-4 mt-auto">';
  if (o.pickup_time) {
    h += '<div class="text-xs text-brand font-medium flex items-center gap-1"><i data-lucide="clock-4" class="w-3.5 h-3.5"></i> Ambil: ' + escHtml(o.pickup_time) + '</div>';
  }
  if (o.notes) {
    h += '<div class="text-xs text-yellow-700 flex items-start gap-1"><i data-lucide="message-square" class="w-3.5 h-3.5 mt-0.5 shrink-0"></i> <span>' + escHtml(o.notes) + '</span></div>';
  }
  h += '</div>';

  h += '<div class="grid grid-cols-2 gap-2 mt-auto pt-3 border-t border-gray-100">';
  h += '  <button class="col-span-1 w-full bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold py-2 rounded-lg transition-colors flex items-center justify-center gap-1" onclick="showDetail(\'' + o.id + '\')">';
  h += '    <i data-lucide="file-text" class="w-3.5 h-3.5"></i> Detail';
  h += '  </button>';
  if (action) {
    h += '<button class="action-primary col-span-1 w-full bg-brand hover:bg-brand-dark text-white text-xs font-bold py-2 rounded-lg transition-colors shadow-sm flex items-center justify-center gap-1" onclick="doUpdateStatus(\'' + o.id + '\',\'' + action.next + '\')">' + action.label + '</button>';
  }
  if (!action && ['pending_payment','paid','preparing','ready'].indexOf(o.status) >= 0) {
    h += '<button class="action-danger col-span-1 w-full bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 text-xs font-semibold py-2 rounded-lg transition-colors flex items-center justify-center gap-1" onclick="doCancel(\'' + o.id + '\')"><i data-lucide="x-circle" class="w-3.5 h-3.5"></i> Batalkan</button>';
  }
  h += '</div>';

  if (action && ['pending_payment','paid','preparing','ready'].indexOf(o.status) >= 0) {
    h += '<div class="mt-2"><button class="action-danger w-full bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 text-xs font-semibold py-2 rounded-lg transition-colors flex items-center justify-center gap-1" onclick="doCancel(\'' + o.id + '\')"><i data-lucide="x-circle" class="w-3.5 h-3.5"></i> Batalkan</button></div>';
  }
  h += '</div>';
  return h;
}

// ─── Aksi ─────────────────────────────────────────────────────────────────────
async function doUpdateStatus(orderId, newStatus) {
  const btn = document.querySelector(`#ord-${orderId} .action-primary`);
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  try {
    await updateOrderStatus(orderId, newStatus);
    const idx = allOrders.findIndex(o => o.id === orderId);
    if (idx >= 0) {
      allOrders[idx] = { ...allOrders[idx], status: newStatus };
      renderOrders();
    }
    adminToast(`✅ Status → ${STATUS_LABELS[newStatus]}`);
    // Kirim notif WA ke customer saat siap diambil atau dibatalkan
    if (newStatus === 'ready' || newStatus === 'cancelled') {
      const event = newStatus === 'ready' ? 'ready' : 'cancelled';
      fetch(`${window.SUKA_CONFIG.supabaseUrl}/functions/v1/send-wa-notifications`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${window.SUKA_CONFIG.supabaseAnonKey}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ order_id: orderId, event }),
      }).catch(() => {});
    }
    // on-order-done sekarang dipanggil dari xendit-webhook saat status paid
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = STATUS_NEXT_ACTION[allOrders.find(o=>o.id===orderId)?.status]?.label || '?'; }
    adminToast('❌ Gagal: ' + e.message);
  }
}

async function doCancel(orderId) {
  if (!confirm('Batalkan pesanan ini? Tindakan ini tidak dapat diurungkan.')) return;
  const btn = document.querySelector(`#ord-${orderId} .action-danger`);
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  const { error } = await window.db.from('orders').update({
    status:        'cancelled',
    cancel_reason: 'Dibatalkan oleh outlet',
    cancelled_at:  new Date().toISOString(),
  }).eq('id', orderId);
  if (error) {
    if (btn) { btn.disabled = false; btn.textContent = 'Batalkan'; }
    adminToast('❌ ' + error.message); return;
  }
  const idx = allOrders.findIndex(o => o.id === orderId);
  if (idx >= 0) { allOrders[idx] = { ...allOrders[idx], status: 'cancelled' }; renderOrders(); }
  adminToast('✅ Pesanan dibatalkan');
  // Kirim WA notif cancelled ke customer
  /* DIMATIKAN SEMENTARA
  fetch(`${window.SUKA_CONFIG.supabaseUrl}/functions/v1/send-wa-notifications`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${window.SUKA_CONFIG.supabaseAnonKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ order_id: orderId, event: 'cancelled' }),
  }).catch(() => {});
  */
}

// doVerifyTransfer & _buildProofSection dihapus — tidak dipakai di flow QRIS

// ─── Helper: bangun body HTML detail order ────────────────────────────────────
function _buildDetailBody(o) {
  var itemsHtml = '';
  (o.order_items || []).forEach(function(i) {
    itemsHtml += '<div class="flex justify-between items-start py-2 border-b border-gray-100 last:border-0">';
    itemsHtml += '  <div>';
    itemsHtml += '    <div class="text-sm font-semibold text-gray-800">' + i.quantity + '× ' + escHtml(i.item_name) + '</div>';
    if (i.note) {
      itemsHtml += '    <div class="text-xs text-gray-500 mt-1 flex items-start gap-1"><i data-lucide="message-square" class="w-3 h-3 mt-0.5"></i> ' + escHtml(i.note) + '</div>';
    }
    itemsHtml += '  </div>';
    itemsHtml += '  <div class="text-sm font-bold text-gray-800 shrink-0 ml-2">' + formatRupiah(i.unit_price * i.quantity) + '</div>';
    itemsHtml += '</div>';
  });

  var h = '<div class="space-y-4">';
  h += '<div class="grid grid-cols-2 gap-y-3 gap-x-4 text-sm">';
  h += '  <div><div class="text-xs text-gray-500 mb-1">Status</div><div>' + statusBadge(o.status) + '</div></div>';
  h += '  <div><div class="text-xs text-gray-500 mb-1">Dibuat Pada</div>';
  h += '    <div class="font-medium text-gray-800 flex items-center gap-1"><i data-lucide="calendar" class="w-3.5 h-3.5 text-gray-400"></i> ' + fmtDateTime(o.created_at) + '</div></div>';
  h += '  <div class="col-span-2"><div class="text-xs text-gray-500 mb-1">Pelanggan</div>';
  h += '    <div class="font-bold text-gray-800">' + escHtml(o.customer_name) + '</div></div>';
  h += '  <div class="col-span-2"><div class="text-xs text-gray-500 mb-1">WhatsApp</div>';
  h += '    <a href="https://wa.me/' + escHtml(o.customer_wa) + '" target="_blank" class="inline-flex items-center gap-1 text-brand hover:underline font-medium">';
  h += '      <i data-lucide="phone" class="w-3.5 h-3.5"></i> ' + escHtml(o.customer_wa) + '</a></div>';
  h += '  <div><div class="text-xs text-gray-500 mb-1">Outlet</div>';
  h += '    <div class="font-medium text-gray-800 flex items-center gap-1"><i data-lucide="store" class="w-3.5 h-3.5 text-gray-400"></i> ' + escHtml((o.outlets || {}).name || '—') + '</div></div>';
  h += '  <div><div class="text-xs text-gray-500 mb-1">Waktu Ambil</div>';
  h += '    <div class="font-medium text-brand flex items-center gap-1"><i data-lucide="clock-4" class="w-3.5 h-3.5"></i> ' + escHtml(o.pickup_time || '—') + '</div></div>';
  h += '</div>';

  h += '<div class="bg-gray-50 rounded-xl p-4 border border-gray-100">';
  h += '  <h4 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">Daftar Pesanan</h4>';
  h += '  <div class="space-y-1">' + itemsHtml + '</div>';
  h += '  <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-200">';
  h += '    <span class="font-bold text-gray-800">Total</span>';
  h += '    <span class="font-extrabold text-brand text-lg">' + formatRupiah(o.total) + '</span>';
  h += '  </div>';
  h += '</div>';

  if (o.notes) {
    h += '<div class="bg-yellow-50 rounded-xl p-4 border border-yellow-100">';
    h += '  <div class="flex items-start gap-2">';
    h += '    <i data-lucide="message-square" class="w-4 h-4 text-yellow-600 mt-0.5"></i>';
    h += '    <div>';
    h += '      <div class="text-xs font-bold text-yellow-800 mb-1">Catatan Pesanan</div>';
    h += '      <div class="text-sm text-yellow-700">' + escHtml(o.notes) + '</div>';
    h += '    </div>';
    h += '  </div>';
    h += '</div>';
  }

  h += '</div>';
  return h;
}

// ─── showDetail: selalu modal ─────────────────────────────────────────────────
function showDetail(orderId) {
  const o = allOrders.find(x => x.id === orderId);
  if (!o) return;
  openModal(`📋 ${o.order_number}`, _buildDetailBody(o));
}

// ─── Realtime ─────────────────────────────────────────────────────────────────
function subscribeOrders(u) {
  const filter = (u.role === 'outlet_staff' && u.outlet_id)
    ? `outlet_id=eq.${u.outlet_id}` : undefined;

  const ch = window.db.channel('admin-orders-rt')
    .on('postgres_changes', {
      event:  '*',
      schema: 'public',
      table:  'orders',
      ...(filter ? { filter } : {}),
    }, payload => handleRealtime(payload))
    .subscribe();

  addRealtimeChannel(ch);
}

async function handleRealtime(payload) {
  if (payload.eventType === 'INSERT') {
    const { data } = await window.db
      .from('orders')
      .select(`id, order_number, customer_name, customer_wa, total, status,
               created_at, pickup_time, notes, outlet_id,
               outlets(name),
               order_items(item_name, quantity, unit_price, selections, note)`)
      .eq('id', payload.new.id)
      .single();
    if (data) {
      allOrders.unshift(data);
      renderOrders();
      playDing();
      adminToast(`🔔 Order baru: ${data.order_number}`);
    }
  } else if (payload.eventType === 'UPDATE') {
    const idx = allOrders.findIndex(o => o.id === payload.new.id);
    if (idx >= 0) {
      allOrders[idx] = { ...allOrders[idx], ...payload.new };
      renderOrders();
    }
  }
}
