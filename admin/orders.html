<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Pesanan — SUKA Admin</title>
<link rel="stylesheet" href="../assets/css/style.css?v=5" />
<link rel="stylesheet" href="../assets/css/admin-desktop.css?v=5" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#f29744" />
</head>
<body>
<div class="phone">

  <!-- Sidebar — hanya muncul di tablet/desktop via CSS -->
  <aside class="admin-sidebar" style="display:none">
    <div class="admin-sidebar-logo">🌯 SUKA Admin</div>
    <div class="admin-sidebar-user">
      <div class="name" id="sidebarName">—</div>
      <div class="role" id="sidebarRole">—</div>
    </div>
    <nav class="admin-sidebar-nav">
      <a href="/admin/index.html"><span>🏠</span><span>Dashboard</span></a>
      <a href="/admin/orders.html"><span>📋</span><span>Pesanan</span></a>
      <a href="/admin/menu.html"><span>🌯</span><span>Menu</span></a>
      <a href="/admin/reports.html"><span>📊</span><span>Laporan</span></a>
      <a href="/admin/customers.html" class="admin-only"><span>🧑‍🤝‍🧑</span><span>Pelanggan</span></a>
      <a href="/admin/vouchers.html" class="admin-only"><span>🎟️</span><span>Voucher</span></a>
      <a href="/admin/outlets.html" class="admin-only"><span>📍</span><span>Outlet</span></a>
      <a href="/admin/users.html" class="admin-only"><span>👥</span><span>Pengguna</span></a>
      <a href="/admin/settings.html" class="admin-only"><span>⚙️</span><span>Pengaturan</span></a>
    </nav>
    <div class="admin-sidebar-footer">
      <button onclick="adminSignOut()">🚪 Keluar</button>
    </div>
  </aside>

  <!-- Topbar -->
  <div class="topbar">
    <span class="topbar-title">📋 Pesanan</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="liveIndicator" class="pulse" title="Realtime aktif" style="display:none"></span>
      <span id="adminName" style="font-size:12px;color:var(--muted)"></span>
    </div>
  </div>

  <div class="admin-content">

  <!-- Filter status -->
  <div class="chips" id="filterChips" style="padding-bottom:8px">
    <button class="chip active" data-status="active"               onclick="setFilter('active')">Aktif</button>
    <button class="chip"        data-status="awaiting_verification" onclick="setFilter('awaiting_verification')">💳 Verifikasi</button>
    <button class="chip"        data-status="paid"                 onclick="setFilter('paid')">Dibayar</button>
    <button class="chip"        data-status="preparing"            onclick="setFilter('preparing')">Disiapkan</button>
    <button class="chip"        data-status="ready"                onclick="setFilter('ready')">Siap Ambil</button>
    <button class="chip"        data-status="done"                 onclick="setFilter('done')">Selesai</button>
    <button class="chip"        data-status="all"                  onclick="setFilter('all')">Semua</button>
  </div>

  <!-- Outlet filter — hanya super_admin -->
  <div id="outletFilterWrap" style="padding:0 12px 8px;display:none">
    <select id="outletFilter" class="form-input" style="font-size:13px" onchange="loadOrders()">
      <option value="">Semua Outlet</option>
    </select>
  </div>

  <!-- Daftar order -->
  <div id="orderList" style="padding:6px 0 80px">
    <div class="skeleton-card"><div class="skeleton-lines">
      <div class="skeleton skeleton-line"></div>
      <div class="skeleton skeleton-line short"></div>
    </div></div>
  </div>

  </div><!-- /admin-content -->

  <!-- Bottom nav -->
  <nav class="admin-nav">
    <a href="/admin/index.html"><span>🏠</span><span>Dashboard</span></a>
    <a href="/admin/orders.html"><span>📋</span><span>Pesanan</span></a>
    <a href="/admin/menu.html"><span>🌯</span><span>Menu</span></a>
    <a href="/admin/reports.html"><span>📊</span><span>Laporan</span></a>
    <a href="/admin/outlets.html" class="admin-only"><span>📍</span><span>Outlet</span></a>
    <a href="/admin/settings.html" class="admin-only"><span>⚙️</span><span>Pengaturan</span></a>
  </nav>

</div>
<div class="toast" id="toast"></div>
<div id="adminModal" class="admin-modal-overlay" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../config.js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
// ─── State ────────────────────────────────────────────────────────────────────
let allOrders     = [];
let currentFilter = 'active';
let currentRole   = '';

const ACTIVE_STATUSES = ['pending_payment', 'proof_rejected', 'awaiting_verification', 'paid', 'preparing', 'ready'];

// ─── Init ─────────────────────────────────────────────────────────────────────
(async function init() {
  const u = await requireAuth();
  if (!u) return;

  currentRole = u.role;
  document.getElementById('liveIndicator').style.display = '';

  if (u.role === 'super_admin') {
    const { data } = await window.db
      .from('outlets').select('id, name').eq('is_active', true).order('name');
    const sel = document.getElementById('outletFilter');
    (data || []).forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.id; opt.textContent = o.name;
      sel.appendChild(opt);
    });
    document.getElementById('outletFilterWrap').style.display = '';
  } else {
    // outlet_staff: sembunyikan chip filter Verifikasi (bukan urusan mereka)
    document.querySelector('[data-status="awaiting_verification"]')?.remove();
  }

  await loadOrders();
  subscribeOrders(u);
})();

// ─── Load orders ──────────────────────────────────────────────────────────────
async function loadOrders() {
  let q = window.db
    .from('orders')
    .select(`id, order_number, customer_name, customer_wa, total, status,
             created_at, pickup_time, notes, outlet_id, proof_url, ai_verification_result,
             outlets(name),
             order_items(item_name, quantity, unit_price, selections, note)`)
    .order('created_at', { ascending: false })
    .limit(200);

  if (adminUser && adminUser.role === 'outlet_staff' && adminUser.outlet_id) {
    // outlet_staff hanya lihat order outlet sendiri
    q = q.eq('outlet_id', adminUser.outlet_id);
  } else {
    // super_admin bisa filter per outlet via dropdown
    const outletId = document.getElementById('outletFilter')?.value || null;
    if (outletId) q = q.eq('outlet_id', outletId);
  }

  const { data } = await q;
  allOrders = data || [];
  renderOrders();
}

// ─── Filter ───────────────────────────────────────────────────────────────────
function setFilter(status) {
  currentFilter = status;
  document.querySelectorAll('#filterChips .chip').forEach(c =>
    c.classList.toggle('active', c.dataset.status === status)
  );
  renderOrders();
}

function getFiltered() {
  if (currentFilter === 'active') return allOrders.filter(o => ACTIVE_STATUSES.includes(o.status));
  if (currentFilter === 'all')    return allOrders;
  return allOrders.filter(o => o.status === currentFilter);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderOrders() {
  const list = getFiltered();
  const el   = document.getElementById('orderList');

  if (list.length === 0) {
    el.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">📭</div>
      <div class="empty-title">Tidak ada pesanan</div>
      <div class="empty-desc">untuk filter ini</div>
    </div>`;
    return;
  }
  el.innerHTML = list.map(orderCard).join('') + '<div style="height:80px"></div>';
}

function orderCard(o) {
  const items      = o.order_items || [];
  const summary    = items.slice(0, 2).map(i => `${i.quantity}× ${i.item_name}`).join(', ')
    + (items.length > 2 ? ` +${items.length - 2} lagi` : '');
  const outletName = (o.outlets || {}).name || '—';
  const action     = STATUS_NEXT_ACTION[o.status];

  return `<div class="admin-order-row" id="ord-${o.id}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <div>
        <span style="font-family:monospace;font-size:11px;color:var(--muted)">${o.order_number}</span>
        <div style="font-weight:700;font-size:14px">${o.customer_name}</div>
        <div style="font-size:12px;color:var(--muted)">${outletName} · ${fmtTimeAgo(o.created_at)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:8px">
        ${statusBadge(o.status)}
        <div style="font-weight:700;font-size:14px;color:var(--brand);margin-top:4px">${formatRupiah(o.total)}</div>
      </div>
    </div>
    ${summary ? `<div style="font-size:12px;color:var(--muted);margin-bottom:4px">${summary}</div>` : ''}
    ${o.pickup_time ? `<div style="font-size:12px;color:var(--ink2)">⏰ Ambil: ${o.pickup_time}</div>` : ''}
    ${o.notes ? `<div style="font-size:12px;color:var(--muted);margin-top:2px">📝 ${o.notes}</div>` : ''}
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
      ${o.status === 'awaiting_verification' && currentRole === 'super_admin' ? `
        <button class="action-btn action-primary" onclick="doVerifyTransfer('${o.id}','approve')" style="background:var(--green,#22c55e)">✅ Verifikasi</button>
        <button class="action-btn action-danger"  onclick="doVerifyTransfer('${o.id}','reject')">❌ Tolak</button>
      ` : o.status === 'awaiting_verification' && currentRole !== 'super_admin' ? `
        <span style="font-size:12px;color:var(--muted)">⏳ Menunggu verifikasi admin pusat</span>
      ` : action ? `<button class="action-btn action-primary" onclick="doUpdateStatus('${o.id}','${action.next}')">${action.label}</button>` : ''}
      <button class="action-btn action-secondary" onclick="showDetail('${o.id}')">
        ${o.status === 'awaiting_verification' ? '🖼 Lihat Bukti' : 'Detail'}
      </button>
      ${['pending_payment','awaiting_verification','proof_rejected','paid','preparing','ready'].includes(o.status)
        ? `<button class="action-btn action-danger" onclick="doCancel('${o.id}')">Batalkan</button>` : ''}
    </div>
  </div>`;
}

// ─── Aksi ─────────────────────────────────────────────────────────────────────
async function doUpdateStatus(orderId, newStatus) {
  const btn = document.querySelector(`#ord-${orderId} .action-primary`);
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  try {
    await updateOrderStatus(orderId, newStatus);
    const idx = allOrders.findIndex(o => o.id === orderId);
    if (idx >= 0) {
      allOrders[idx] = { ...allOrders[idx], status: newStatus };
      renderOrders();
    }
    adminToast(`✅ Status → ${STATUS_LABELS[newStatus]}`);
    // Kirim notif WA ke customer saat siap diambil atau dibatalkan
    if (newStatus === 'ready' || newStatus === 'cancelled') {
      const event = newStatus === 'ready' ? 'ready' : 'cancelled';
      fetch(`${window.SUKA_CONFIG.supabaseUrl}/functions/v1/send-wa-notifications`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${window.SUKA_CONFIG.supabaseAnonKey}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ order_id: orderId, event }),
      }).catch(() => {});
    }
    // Trigger loyalty check saat order selesai (fire and forget)
    if (newStatus === 'done') {
      fetch(`${window.SUKA_CONFIG.supabaseUrl}/functions/v1/on-order-done`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${window.SUKA_CONFIG.supabaseAnonKey}`, 'apikey': window.SUKA_CONFIG.supabaseAnonKey, 'Content-Type': 'application/json' },
        body: JSON.stringify({ order_id: orderId }),
      }).catch(() => {});
    }
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = STATUS_NEXT_ACTION[allOrders.find(o=>o.id===orderId)?.status]?.label || '?'; }
    adminToast('❌ Gagal: ' + e.message);
  }
}

async function doCancel(orderId) {
  if (!confirm('Batalkan pesanan ini? Tindakan ini tidak dapat diurungkan.')) return;
  const btn = document.querySelector(`#ord-${orderId} .action-danger`);
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  const { error } = await window.db.from('orders').update({
    status:       'cancelled',
    cancel_reason: 'Dibatalkan oleh outlet',
    cancelled_at:  new Date().toISOString(),
  }).eq('id', orderId);
  if (error) {
    if (btn) { btn.disabled = false; btn.textContent = 'Batalkan'; }
    adminToast('❌ ' + error.message); return;
  }
  const idx = allOrders.findIndex(o => o.id === orderId);
  if (idx >= 0) { allOrders[idx] = { ...allOrders[idx], status: 'cancelled' }; renderOrders(); }
  adminToast('✅ Pesanan dibatalkan');
}

async function doVerifyTransfer(orderId, action) {
  const label = action === 'approve' ? 'Verifikasi' : 'Tolak';
  if (!confirm(`${label} pembayaran pesanan ini?`)) return;

  const { error } = await window.db.rpc('verify_transfer', {
    p_order_id: orderId,
    p_action:   action,
  });

  if (error) { adminToast('❌ ' + error.message); return; }

  const idx = allOrders.findIndex(o => o.id === orderId);
  if (idx >= 0) {
    const newStatus = action === 'approve' ? 'paid' : 'proof_rejected';
    allOrders[idx] = { ...allOrders[idx], status: newStatus };
    renderOrders();
  }

  adminToast(action === 'approve' ? '✅ Pembayaran diverifikasi' : '❌ Bukti transfer ditolak');

  // Kirim WA notif ke customer
  const waEvent = action === 'approve' ? 'transfer_verified' : 'transfer_rejected';
  fetch(`${window.SUKA_CONFIG.supabaseUrl}/functions/v1/send-wa-notifications`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${window.SUKA_CONFIG.supabaseAnonKey}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ order_id: orderId, event: waEvent }),
  }).catch(() => {});
}

// ─── Helper: bangun bagian AI & bukti transfer ────────────────────────────────
function _buildProofSection(o) {
  const ai = o.ai_verification_result;
  const aiHtml = ai ? (() => {
    const badge = {
      high:   { color: '#16a34a', bg: '#f0fdf4', label: '✅ Tinggi' },
      medium: { color: '#d97706', bg: '#fffbeb', label: '⚠️ Sedang' },
      low:    { color: '#dc2626', bg: '#fef2f2', label: '❌ Rendah' },
      error:  { color: '#6b7280', bg: '#f9fafb', label: '⚠️ Error' },
    }[ai.confidence] || { color: '#6b7280', bg: '#f9fafb', label: ai.confidence };
    const ext = ai.extracted || {};
    return `
      <div style="padding:10px 12px;background:${badge.bg};border-radius:8px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-weight:700;font-size:13px">🤖 Analisis AI</span>
          <span style="font-size:12px;font-weight:700;color:${badge.color}">${badge.label}</span>
        </div>
        ${ext.nominal   ? `<div style="font-size:12px">💰 Nominal: <b>Rp ${Number(ext.nominal).toLocaleString('id-ID')}</b></div>` : ''}
        ${ext.penerima  ? `<div style="font-size:12px">👤 Penerima: <b>${ext.penerima}</b></div>` : ''}
        ${ext.bank_penerima ? `<div style="font-size:12px">🏦 Bank: <b>${ext.bank_penerima}</b></div>` : ''}
        ${ext.status    ? `<div style="font-size:12px">📋 Status: <b>${ext.status}</b></div>` : ''}
        ${ai.reason     ? `<div style="font-size:11px;color:${badge.color};margin-top:4px">${ai.reason}</div>` : ''}
        ${ai.auto_approved ? `<div style="font-size:12px;font-weight:700;color:#16a34a;margin-top:4px">✅ Auto-approved oleh AI</div>` : ''}
      </div>`;
  })() : '';

  if (o.proof_url) return `
    <hr style="border:0;border-top:1px dashed var(--line2);margin:10px 0"/>
    <div style="font-weight:600;font-size:13px;margin-bottom:8px">📸 Bukti Transfer</div>
    ${aiHtml}
    <img id="adminProofImg" data-path="${o.proof_url}" style="width:100%;border-radius:8px;max-height:250px;object-fit:cover;background:var(--line)" />
    ${o.status === 'awaiting_verification' && currentRole === 'super_admin' ? `
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="action-btn action-primary" style="flex:1;background:var(--green,#22c55e)"
          onclick="closeModal();doVerifyTransfer('${o.id}','approve')">✅ Verifikasi</button>
        <button class="action-btn action-danger" style="flex:1"
          onclick="closeModal();doVerifyTransfer('${o.id}','reject')">❌ Tolak</button>
      </div>` : o.status === 'awaiting_verification' ? `
      <div style="margin-top:10px;padding:10px;background:#fef9c3;border-radius:8px;font-size:13px;color:#854d0e">
        ⏳ Menunggu verifikasi oleh admin pusat
      </div>` : ''}
  `;
  if (o.status === 'proof_rejected') return `
    <hr style="border:0;border-top:1px dashed var(--line2);margin:10px 0"/>
    <div style="padding:10px 12px;background:#fbe7df;border-radius:10px;font-size:13px;line-height:1.6">
      ❌ <b>Bukti transfer ditolak.</b><br/>
      Menunggu customer upload ulang bukti yang benar.
    </div>
  `;
  return '';
}

// ─── Helper: bangun body HTML detail order ────────────────────────────────────
function _buildDetailBody(o) {
  const itemsHtml = (o.order_items || []).map(i => `
    <div class="info-row" style="padding:4px 0;align-items:flex-start">
      <span class="label">${i.quantity}× ${i.item_name}${i.note ? `<br><span style="font-size:11px;color:var(--muted);font-weight:400">📝 ${i.note}</span>` : ''}</span>
      <span class="val" style="text-align:right;flex-shrink:0;margin-left:8px">${formatRupiah(i.unit_price * i.quantity)}</span>
    </div>`).join('');

  return `
    <div class="info-row"><span class="label">Status</span><span class="val">${statusBadge(o.status)}</span></div>
    <div class="info-row"><span class="label">Nama</span><span class="val">${o.customer_name}</span></div>
    <div class="info-row"><span class="label">WhatsApp</span>
      <span class="val"><a href="https://wa.me/${o.customer_wa}" target="_blank" style="color:var(--brand)">${o.customer_wa}</a></span>
    </div>
    <div class="info-row"><span class="label">Waktu Ambil</span><span class="val">${o.pickup_time || '—'}</span></div>
    <div class="info-row"><span class="label">Outlet</span><span class="val">${(o.outlets || {}).name || '—'}</span></div>
    <div class="info-row"><span class="label">Dibuat</span><span class="val">${fmtDateTime(o.created_at)}</span></div>
    <hr style="border:0;border-top:1px dashed var(--line2);margin:10px 0"/>
    ${itemsHtml}
    <hr style="border:0;border-top:1px dashed var(--line2);margin:10px 0"/>
    <div class="info-row">
      <span class="label" style="font-weight:700">Total</span>
      <span class="val" style="font-weight:800;color:var(--brand);font-size:16px">${formatRupiah(o.total)}</span>
    </div>
    ${o.notes ? `<div style="margin-top:8px;font-size:13px;color:var(--muted);background:var(--bg);padding:8px 10px;border-radius:8px">📝 ${o.notes}</div>` : ''}
    ${_buildProofSection(o)}
  `;
}

// ─── showDetail: selalu modal ─────────────────────────────────────────────────
function showDetail(orderId) {
  const o = allOrders.find(x => x.id === orderId);
  if (!o) return;
  openModal(`📋 ${o.order_number}`, _buildDetailBody(o));
  if (o.proof_url) loadSignedAdminProofUrl(o.proof_url);
}

function loadSignedAdminProofUrl(pathOrUrl) {
  const img = document.getElementById('adminProofImg');
  if (!img || !pathOrUrl) return;
  if (pathOrUrl.startsWith('http')) { img.src = pathOrUrl; return; }
  const { data } = window.db.storage.from('transfer-proofs').getPublicUrl(pathOrUrl);
  if (data?.publicUrl) img.src = data.publicUrl;
}

// ─── Realtime ─────────────────────────────────────────────────────────────────
function subscribeOrders(u) {
  const filter = (u.role === 'outlet_staff' && u.outlet_id)
    ? `outlet_id=eq.${u.outlet_id}` : undefined;

  const ch = window.db.channel('admin-orders-rt')
    .on('postgres_changes', {
      event:  '*',
      schema: 'public',
      table:  'orders',
      ...(filter ? { filter } : {}),
    }, payload => handleRealtime(payload))
    .subscribe();

  addRealtimeChannel(ch);
}

async function handleRealtime(payload) {
  if (payload.eventType === 'INSERT') {
    const { data } = await window.db
      .from('orders')
      .select(`id, order_number, customer_name, customer_wa, total, status,
               created_at, pickup_time, notes, outlet_id, proof_url, ai_verification_result,
               outlets(name),
               order_items(item_name, quantity, unit_price, selections, note)`)
      .eq('id', payload.new.id)
      .single();
    if (data) {
      allOrders.unshift(data);
      renderOrders();
      playDing();
      adminToast(`🔔 Order baru: ${data.order_number}`);
    }
  } else if (payload.eventType === 'UPDATE') {
    const idx = allOrders.findIndex(o => o.id === payload.new.id);
    if (idx >= 0) {
      allOrders[idx] = { ...allOrders[idx], ...payload.new };
      renderOrders();
    }
  }
}
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
